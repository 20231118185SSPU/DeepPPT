<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <g id="background">
        <rect width="1280" height="720" fill="#1C1C1C" />
        <image href="images/p07_trans_awakening.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
        <rect x="0" y="0" width="1280" height="720" fill="#1C1C1C" fill-opacity="0.55" />
    </g>
    <g id="prev-section">
        <text x="60" y="200" fill="#E8E8E8" fill-opacity="0.45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">前文明</text>
        <text x="60" y="235" fill="#E8E8E8" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19">博士属于前文明——一个万年前的失落文明</text>
    </g>
    <g id="chapter-hero">
        <text x="60" y="350" fill="#8B1A1A" fill-opacity="0.15" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="120" font-weight="bold">02</text>
        <text x="60" y="425" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="bold">苏醒与失忆</text>
        <text x="60" y="470" fill="#E8E8E8" fill-opacity="0.75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">2019年，一个冷冻舱在切尔诺伯格地下被打开——一个沉睡万年的人，醒了过来</text>
    </g>
    <g id="next-hook">
        <line x1="60" y1="520" x2="400" y2="520" stroke="#8B1A1A" stroke-width="1" stroke-opacity="0.3" />
        <text x="60" y="558" fill="#E8E8E8" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17">"你什么都回忆不起来"——阿米娅的第一句话</text>
    </g>
</svg>
