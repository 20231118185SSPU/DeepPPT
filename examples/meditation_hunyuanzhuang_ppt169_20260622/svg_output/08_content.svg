<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5F0E6"/>

  <!-- Right 35%: background image -->
  <image href="images/P08_content_bg.png" x="832" y="0" width="448" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="832" y="0" width="448" height="720" fill="#425066" fill-opacity="0.25"/>

  <!-- Left text area -->
  <text x="400" y="80" font-family="SimSun, Georgia, serif" font-size="36" font-weight="bold" fill="#425066" text-anchor="middle">站桩为拳学之母</text>

  <!-- Bullet points -->
  <circle cx="220" cy="180" r="4" fill="#7A5230"/>
  <text x="236" y="186" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="22" fill="#2D2D2D" text-anchor="start">王芗斋（1885-1963），师从形意拳大师郭云深</text>

  <circle cx="220" cy="260" r="4" fill="#7A5230"/>
  <text x="236" y="266" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="22" fill="#2D2D2D" text-anchor="start">"混元"源于道家宇宙论——天地未分前的原始混沌</text>

  <circle cx="220" cy="340" r="4" fill="#7A5230"/>
  <text x="236" y="346" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="22" fill="#2D2D2D" text-anchor="start">混元桩贯穿养生桩和技击桩，是意拳体系的母功</text>

  <circle cx="220" cy="420" r="4" fill="#7A5230"/>
  <text x="236" y="426" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="22" fill="#2D2D2D" text-anchor="start">核心追求：全身筋骨、意念、呼吸合为一体</text>

  <!-- Bottom quote bar -->
  <rect x="0" y="660" width="1280" height="60" fill="#425066"/>
  <text x="640" y="696" font-family="KaiTi, Georgia, serif" font-size="18" fill="#FFFFFF" text-anchor="middle">"站桩为拳学之母"——王芗斋《大成拳论》</text>
</svg>
