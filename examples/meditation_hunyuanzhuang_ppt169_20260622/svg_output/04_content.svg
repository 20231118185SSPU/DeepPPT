<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F5F0E6"/>
  <!-- Left background image area -->
  <image href="images/P04_content_bg.png" x="0" y="0" width="512" height="720" preserveAspectRatio="xMidYMid slice"/>
  <!-- Gradient overlay on left image -->
  <rect x="412" y="0" width="100" height="720" fill="#F5F0E6" fill-opacity="0.8"/>
  <!-- Right text area background -->
  <rect x="512" y="0" width="768" height="720" fill="#F5F0E6"/>

  <!-- Title -->
  <text x="540" y="80" font-family="SimSun, Georgia, serif" font-size="32" font-weight="bold" fill="#425066">8周，大脑的物理结构改变了</text>

  <!-- Card 1 -->
  <rect x="540" y="120" width="680" height="80" rx="12" fill="#EDE7D9" stroke="#C8C0B0" stroke-width="1"/>
  <text x="560" y="150" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#425066">前额叶皮层增厚</text>
  <text x="560" y="178" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#555555">→ 决策力、情绪调节 ↑</text>

  <!-- Card 2 -->
  <rect x="540" y="220" width="680" height="80" rx="12" fill="#EDE7D9" stroke="#C8C0B0" stroke-width="1"/>
  <text x="560" y="250" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#425066">海马体灰质增加</text>
  <text x="560" y="278" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#555555">→ 学习、记忆 ↑</text>

  <!-- Card 3 -->
  <rect x="540" y="320" width="680" height="80" rx="12" fill="#EDE7D9" stroke="#C8C0B0" stroke-width="1"/>
  <text x="560" y="350" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#425066">杏仁核体积缩小</text>
  <text x="560" y="378" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#555555">→ 恐惧/压力反应 ↓</text>

  <!-- Card 4 -->
  <rect x="540" y="420" width="680" height="80" rx="12" fill="#EDE7D9" stroke="#C8C0B0" stroke-width="1"/>
  <text x="560" y="450" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#425066">默认模式网络活动减少</text>
  <text x="560" y="478" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#555555">→ 走神 ↓</text>

  <!-- Bottom takeaway bar -->
  <rect x="0" y="640" width="1280" height="80" fill="#425066"/>
  <text x="640" y="685" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#FFFFFF">仅8周MBSR训练，即可观察到可测量的脑结构变化（Holzel 2011）</text>
</svg>
