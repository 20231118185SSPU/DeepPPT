<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- ==================== 背景 ==================== -->
    <rect width="1280" height="720" fill="#F8FAFC" />
    <image href="../images/P02_toc_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <!-- 浅色半透明遮罩 -->
    <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC" fill-opacity="0.82" />

    <!-- ==================== 目录标题 ==================== -->
    <text x="60" y="80" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="36"
        font-weight="bold">
        目录
    </text>
    <text x="155" y="80" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif"
        font-size="18">
        CONTENTS
    </text>
    <!-- 标题装饰线 -->
    <rect x="60" y="92" width="80" height="3" rx="1.5" fill="#2563EB" />

    <!-- ==================== 目录项（5项） ==================== -->
    <!-- 01 底层逻辑 -->
    <rect x="60" y="130" width="560" height="100" fill="#E8EDF2" rx="8" />
    <text x="95" y="185" fill="#2563EB" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="40" font-weight="bold">01</text>
    <text x="160" y="170" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="22" font-weight="bold">底层逻辑</text>
    <text x="160" y="202" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="14">AI 如何理解图片需求</text>

    <!-- 02 工具准备 -->
    <rect x="660" y="130" width="560" height="100" fill="#E8EDF2" rx="8" />
    <text x="695" y="185" fill="#2563EB" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="40" font-weight="bold">02</text>
    <text x="760" y="170" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="22" font-weight="bold">工具准备</text>
    <text x="760" y="202" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="14">DeepSeek + GPT-Image + 辅助工具</text>

    <!-- 03 标准工作流 -->
    <rect x="60" y="255" width="560" height="100" fill="#E8EDF2" rx="8" />
    <text x="95" y="310" fill="#2563EB" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="40" font-weight="bold">03</text>
    <text x="160" y="295" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="22" font-weight="bold">标准工作流</text>
    <text x="160" y="327" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="14">三步出图法</text>

    <!-- 04 生成与迭代 -->
    <rect x="660" y="255" width="560" height="100" fill="#E8EDF2" rx="8" />
    <text x="695" y="310" fill="#2563EB" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="40" font-weight="bold">04</text>
    <text x="760" y="295" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="22" font-weight="bold">生成与迭代</text>
    <text x="760" y="327" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="14">从出图到完美</text>

    <!-- 05 总结 -->
    <rect x="60" y="380" width="560" height="90" fill="none" stroke="#CBD5E1" stroke-width="1.5" rx="8" />
    <text x="340" y="433" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="18">05 · 总结 — 能力公式</text>

    <!-- 空位（保持视觉平衡） -->
    <rect x="660" y="380" width="560" height="90" fill="none" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.4" rx="8" />
</svg>
