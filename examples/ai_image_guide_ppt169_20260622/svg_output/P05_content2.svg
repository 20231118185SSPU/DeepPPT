<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- ==================== 浅色背景（微调色调） ==================== -->
    <rect width="1280" height="720" fill="#F0F4F8" />

    <!-- ==================== 标题区 ==================== -->
    <text x="60" y="55" fill="#94A3B8" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="13">
        §1 底层逻辑
    </text>

    <text x="60" y="85" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="32" font-weight="bold">
        AI 生图核心公式
    </text>

    <!-- 圆点装饰 -->
    <circle cx="60" cy="102" r="3" fill="#2563EB" fill-opacity="0.5" />
    <circle cx="74" cy="102" r="3" fill="#2563EB" fill-opacity="0.35" />
    <circle cx="88" cy="102" r="3" fill="#2563EB" fill-opacity="0.2" />

    <!-- ==================== 核心视觉区：六步流程 ==================== -->
    <!-- 六步流程横向排列 -->
    <!-- Step 1: 需求想法 -->
    <rect x="60" y="150" width="170" height="180" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="60" y="150" width="170" height="6" fill="#2563EB" rx="3" />
    <text x="145" y="200" text-anchor="middle" fill="#2563EB" font-family="Segoe UI, Arial, sans-serif"
        font-size="36" font-weight="bold">01</text>
    <text x="145" y="235" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="18" font-weight="bold">需求想法</text>
    <text x="145" y="265" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="13">我要什么样的图</text>

    <!-- Arrow -->
    <text x="248" y="250" fill="#94A3B8" font-size="24">→</text>

    <!-- Step 2: 文案拆解 -->
    <rect x="280" y="150" width="170" height="180" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="280" y="150" width="170" height="6" fill="#10B981" rx="3" />
    <text x="365" y="200" text-anchor="middle" fill="#10B981" font-family="Segoe UI, Arial, sans-serif"
        font-size="36" font-weight="bold">02</text>
    <text x="365" y="235" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="18" font-weight="bold">文案拆解</text>
    <text x="365" y="265" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="13">分解为结构化要素</text>

    <text x="468" y="250" fill="#94A3B8" font-size="24">→</text>

    <!-- Step 3: 排版设计 -->
    <rect x="500" y="150" width="170" height="180" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="500" y="150" width="170" height="6" fill="#F97316" rx="3" />
    <text x="585" y="200" text-anchor="middle" fill="#F97316" font-family="Segoe UI, Arial, sans-serif"
        font-size="36" font-weight="bold">03</text>
    <text x="585" y="235" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="18" font-weight="bold">排版设计</text>
    <text x="585" y="265" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="13">视觉布局规划</text>

    <text x="688" y="250" fill="#94A3B8" font-size="24">→</text>

    <!-- Step 4: 提示词生成 -->
    <rect x="720" y="150" width="170" height="180" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="720" y="150" width="170" height="6" fill="#2563EB" rx="3" />
    <text x="805" y="200" text-anchor="middle" fill="#2563EB" font-family="Segoe UI, Arial, sans-serif"
        font-size="36" font-weight="bold">04</text>
    <text x="805" y="235" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="18" font-weight="bold">提示词</text>
    <text x="805" y="265" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="13">生成 AI 可理解的描述</text>

    <text x="908" y="250" fill="#94A3B8" font-size="24">→</text>

    <!-- Step 5: AI 出图 -->
    <rect x="940" y="150" width="170" height="180" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="940" y="150" width="170" height="6" fill="#F97316" rx="3" />
    <text x="1025" y="200" text-anchor="middle" fill="#F97316" font-family="Segoe UI, Arial, sans-serif"
        font-size="36" font-weight="bold">05</text>
    <text x="1025" y="235" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="18" font-weight="bold">AI 出图</text>
    <text x="1025" y="265" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="13">模型生成图片</text>

    <!-- 循环回到 Step 6 -->
    <text x="1128" y="250" fill="#94A3B8" font-size="24">→</text>

    <!-- Step 6: 迭代优化 -->
    <rect x="940" y="370" width="170" height="120" fill="#FFFFFF" rx="12" stroke="#10B981" stroke-width="2" />
    <rect x="940" y="370" width="170" height="6" fill="#10B981" rx="3" />
    <text x="1025" y="420" text-anchor="middle" fill="#10B981" font-family="Segoe UI, Arial, sans-serif"
        font-size="28" font-weight="bold">06</text>
    <text x="1025" y="455" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="18" font-weight="bold">迭代优化</text>

    <!-- 循环箭头 -->
    <text x="805" y="440" text-anchor="middle" fill="#10B981" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="14">↺ 不满意回到步骤 2-4</text>

    <!-- AI 生成的流程图配图 -->
    <image href="../images/P05_content_ai.png" x="60" y="370" width="420" height="236" preserveAspectRatio="xMidYMid slice" />

    <!-- ==================== Takeaway 区 ==================== -->
    <rect x="60" y="640" width="1160" height="1" fill="#CBD5E1" />

    <rect x="60" y="655" width="6" height="30" fill="#F97316" rx="3" />
    <text x="80" y="680" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
        font-size="22" font-weight="bold">
        六步闭环，每一步都影响最终效果
    </text>
</svg>
