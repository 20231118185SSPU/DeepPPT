<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F8FAFC" />

    <!-- 标题区 -->
    <text x="60" y="55" fill="#94A3B8" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="13">§3 标准工作流</text>
    <text x="60" y="85" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="32" font-weight="bold">三步出图法</text>
    <rect x="60" y="98" width="300" height="2" fill="#2563EB" fill-opacity="0.3" />

    <!-- 三步流程卡片 -->
    <!-- Step 1 -->
    <rect x="60" y="130" width="370" height="400" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="60" y="130" width="370" height="80" fill="#2563EB" rx="12" />
    <rect x="60" y="198" width="370" height="12" fill="#2563EB" />
    <text x="245" y="180" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="bold">Step 1</text>
    <text x="245" y="260" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="22" font-weight="bold">明确目标</text>
    <line x1="100" y1="280" x2="390" y2="280" stroke="#E8EDF2" stroke-width="1" />
    <text x="90" y="310" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">我要什么样的图？</text>
    <text x="90" y="340" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">明确风格、色调、内容</text>
    <text x="90" y="370" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">确定使用场景</text>
    <rect x="90" y="440" width="310" height="50" fill="#2563EB" fill-opacity="0.08" rx="8" />
    <text x="245" y="472" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold">关键词：想清楚再动手</text>

    <!-- Arrow -->
    <text x="448" y="340" fill="#2563EB" font-size="36">→</text>

    <!-- Step 2 -->
    <rect x="490" y="130" width="340" height="400" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="490" y="130" width="340" height="80" fill="#10B981" rx="12" />
    <rect x="490" y="198" width="340" height="12" fill="#10B981" />
    <text x="660" y="180" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="bold">Step 2</text>
    <text x="660" y="260" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="22" font-weight="bold">发送给 DeepSeek</text>
    <line x1="530" y1="280" x2="790" y2="280" stroke="#E8EDF2" stroke-width="1" />
    <text x="520" y="310" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">把文案发送给 DeepSeek</text>
    <text x="520" y="340" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">AI 自动分析并理解需求</text>
    <text x="520" y="370" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">等待 AI 返回结构化方案</text>
    <rect x="520" y="440" width="280" height="50" fill="#10B981" fill-opacity="0.08" rx="8" />
    <text x="660" y="472" text-anchor="middle" fill="#10B981" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold">关键词：让 AI 理解你</text>

    <!-- Arrow -->
    <text x="848" y="340" fill="#10B981" font-size="36">→</text>

    <!-- Step 3 -->
    <rect x="880" y="130" width="340" height="400" fill="#FFFFFF" rx="12" stroke="#CBD5E1" stroke-width="1" />
    <rect x="880" y="130" width="340" height="80" fill="#F97316" rx="12" />
    <rect x="880" y="198" width="340" height="12" fill="#F97316" />
    <text x="1050" y="180" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="bold">Step 3</text>
    <text x="1050" y="260" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="22" font-weight="bold">输出排版方案</text>
    <line x1="920" y1="280" x2="1180" y2="280" stroke="#E8EDF2" stroke-width="1" />
    <text x="910" y="310" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">获得结构化排版方案</text>
    <text x="910" y="340" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">获得 AI 绘图提示词</text>
    <text x="910" y="370" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15">审阅并微调细节</text>
    <rect x="910" y="440" width="280" height="50" fill="#F97316" fill-opacity="0.08" rx="8" />
    <text x="1050" y="472" text-anchor="middle" fill="#F97316" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold">关键词：结构化输出</text>

    <!-- Takeaway -->
    <rect x="60" y="600" width="1160" height="1" fill="#CBD5E1" />
    <rect x="60" y="615" width="6" height="30" fill="#2563EB" rx="3" />
    <text x="80" y="640" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="22" font-weight="bold">结构化需求是好图的前提</text>
</svg>
