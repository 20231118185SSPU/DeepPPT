    </text>

    <!-- ==================== 推荐流程 ==================== -->
    <rect x="200" y="430" width="880" height="50" fill="#E8EDF2" rx="25" />
    <text x="340" y="462" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="16" font-weight="bold">DeepSeek</text>
    <text x="430" y="462" fill="#94A3B8" font-size="18">→</text>
    <text x="530" y="462" text-anchor="middle" fill="#10B981" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="16" font-weight="bold">排版设计</text>
    <text x="620" y="462" fill="#94A3B8" font-size="18">→</text>
    <text x="730" y="462" text-anchor="middle" fill="#F97316" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="16" font-weight="bold">GPT-Image2</text>
    <text x="830" y="462" fill="#94A3B8" font-size="18">→</text>
    <text x="920" y="462" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="16" font-weight="bold">修改优化</text>
    <text x="1010" y="462" fill="#94A3B8" font-size="18">→</text>
    <text x="1080" y="462" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="16" font-weight="bold">交付</text>

