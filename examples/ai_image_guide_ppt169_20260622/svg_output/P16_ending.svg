<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- ==================== 背景 ==================== -->
    <rect width="1280" height="720" fill="#F8FAFC" />
    <image href="../images/P16_ending_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />

    <!-- 浅色遮罩 -->
    <rect x="0" y="200" width="1280" height="380" fill="#F8FAFC" fill-opacity="0.8" />

    <!-- 装饰线 -->
    <rect x="440" y="280" width="400" height="3" rx="1.5" fill="#2563EB" />

    <!-- ==================== 能力公式 ==================== -->
    <text x="640" y="340" text-anchor="middle" fill="#1E293B" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif"
