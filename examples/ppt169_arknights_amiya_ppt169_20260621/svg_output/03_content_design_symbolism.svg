    <text x="60" y="570" fill="#E8E8E8" fill-opacity="0.65" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">五大符号：黑王冠 | 魔王之剑 | 兜帽 | 指环 | 源石结晶</text>
    <line x1="60" y1="600" x2="1220" y2="600" stroke="#D4A848" stroke-width="1" stroke-opacity="0.15" />
