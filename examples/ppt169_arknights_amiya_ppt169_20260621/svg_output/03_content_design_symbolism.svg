    <rect width="1280" height="720" fill="#0A0E1A" />
    <text x="60" y="55" fill="#D4A848" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">身份 · 05</text>
    <text x="60" y="85" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold">每一个设计元素都承载着叙事信息</text>
