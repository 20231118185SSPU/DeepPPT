<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#0A0E1A" />
    <image href="images/P09_transition_awakening.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="1280" height="720" fill="#0A0E1A" fill-opacity="0.55" />
    <text x="60" y="200" fill="#E8E8E8" fill-opacity="0.45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">危机</text>
    <text x="60" y="240" fill="#E8E8E8" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">阿米娅经历了失去、幻灭和泪水——从天真走向了对世界复杂性的认知</text>
    <text x="60" y="360" fill="#D4A848" fill-opacity="0.15" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="120" font-weight="bold">03</text>
    <text x="60" y="430" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="bold">魔王的苏醒</text>
    <text x="60" y="480" fill="#E8E8E8" fill-opacity="0.75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">在第八章的战场上，她从被保护的孩子蜕变为接受命运的领袖</text>
    <line x1="60" y1="530" x2="400" y2="530" stroke="#D4A848" stroke-width="1" stroke-opacity="0.3" />
    <text x="60" y="570" fill="#E8E8E8" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">但真正的考验还没有到来。在第八章，她将面对自己体内沉睡的力量</text>
</svg>
