    <text x="760" y="192" fill="#E8E8E8" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">感染者的现实与失去的重量</text>
    <rect x="60" y="245" width="560" height="100" fill="#FFFFFF" fill-opacity="0.06" rx="8" />
