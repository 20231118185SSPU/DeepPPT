    <text x="160" y="317" fill="#E8E8E8" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">魔王之力与命运的抉择</text>
    <rect x="660" y="245" width="560" height="100" fill="#FFFFFF" fill-opacity="0.06" rx="8" />
    <text x="695" y="300" fill="#D4A848" fill-opacity="0.9" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="bold">04</text>
    <text x="760" y="285" fill="#E8E8E8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">羁绊</text>
    <text x="760" y="317" fill="#E8E8E8" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">连接两个世界的人</text>
