<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#151B2E" />
    <text x="60" y="55" fill="#D4A848" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">回响 · 06</text>
    <text x="60" y="85" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold">她不只是游戏角色——她是明日方舟本身</text>
    <circle cx="60" cy="102" r="3" fill="#D4A848" fill-opacity="0.35" />
    <circle cx="74" cy="102" r="3" fill="#D4A848" fill-opacity="0.25" />
    <circle cx="88" cy="102" r="3" fill="#D4A848" fill-opacity="0.15" />
    <rect x="56" y="116" width="1168" height="418" fill="none" stroke="#2A3040" stroke-width="1" rx="6" />
    <image href="images/P17_content_community_impact.png" x="60" y="120" width="1160" height="410" preserveAspectRatio="xMidYMid slice" />
    <text x="60" y="565" fill="#E8E8E8" fill-opacity="0.65" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">"小驴"的爱称承载着玩家对这个角色的深厚感情——视为家人般的亲切感</text>
    <line x1="60" y1="598" x2="1220" y2="598" stroke="#2A3040" stroke-width="1" />
    <text x="60" y="640" fill="#D4A848" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">她既是你的陪伴者，又拥有独立于你的完整人格——她的故事，属于所有人</text>
    <rect x="1200" y="625" width="3" height="24" fill="#D4A848" fill-opacity="0.3" />
</svg>
