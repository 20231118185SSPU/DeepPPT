<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#0A0E1A" />
    <text x="60" y="55" fill="#D4A848" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">危机 · 02</text>
    <text x="60" y="85" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold">善意无法拯救所有人</text>
    <line x1="60" y1="98" x2="360" y2="98" stroke="#D4A848" stroke-width="2" stroke-opacity="0.3" />
    <image href="images/P07_content_skullshatterer.png" x="60" y="115" width="1160" height="425" preserveAspectRatio="xMidYMid slice" />
    <text x="60" y="570" fill="#E8E8E8" fill-opacity="0.65" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">米莎——一个阿米娅曾想要保护的感染者少女，最终选择了联合运动的暴力道路</text>
    <line x1="60" y1="600" x2="1220" y2="600" stroke="#D4A848" stroke-width="1" stroke-opacity="0.15" />
    <text x="60" y="640" fill="#D4A848" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">她的天真在这一刻开始碎裂——第一次，善意未能战胜结构性的不公</text>
    <rect x="1200" y="620" width="20" height="3" fill="#D4A848" fill-opacity="0.3" />
    <rect x="1200" y="628" width="14" height="3" fill="#D4A848" fill-opacity="0.2" />
</svg>
