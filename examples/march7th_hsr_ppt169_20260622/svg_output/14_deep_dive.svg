<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#F8F4F0"/>

  <!-- Left 40% image -->
  <image href="images/web_assets/dd_p14_combat.png" x="0" y="0" width="512" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="512" height="720" fill="#F8F4F0" fill-opacity="0.3"/>

  <!-- Right text area centered at x=900 -->

  <!-- Title -->
  <text x="900" y="80" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="36" font-weight="bold" fill="#D4789C">战斗数据速览</text>

  <!-- Hero stats 2x2 grid (y=140-340) -->
  <!-- HP -->
  <rect x="640" y="140" width="250" height="90" rx="12" fill="#F0ECF4" stroke="#7EB8D8" stroke-width="2"/>
  <text x="765" y="175" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#7EB8D8">1058</text>
  <text x="765" y="210" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">HP 生命值</text>

  <!-- ATK -->
  <rect x="910" y="140" width="250" height="90" rx="12" fill="#F0ECF4" stroke="#D4789C" stroke-width="2"/>
  <text x="1035" y="175" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#D4789C">511</text>
  <text x="1035" y="210" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">ATK 攻击力</text>

  <!-- DEF -->
  <rect x="640" y="250" width="250" height="90" rx="12" fill="#F0ECF4" stroke="#9B72CF" stroke-width="2"/>
  <text x="765" y="285" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#9B72CF">573</text>
  <text x="765" y="320" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">DEF 防御力</text>

  <!-- SPD -->
  <rect x="910" y="250" width="250" height="90" rx="12" fill="#F0ECF4" stroke="#6B6B80" stroke-width="2"/>
  <text x="1035" y="285" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#6B6B80">101</text>
  <text x="1035" y="320" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">SPD 速度</text>

  <!-- Skill Card 1 -->
  <rect x="625" y="370" width="550" height="70" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="900" y="398" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#D4789C">战技·可爱即是正义</text>
  <text x="900" y="422" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">单体护盾 + 嘲讽</text>

  <!-- Skill Card 2 -->
  <rect x="625" y="460" width="550" height="70" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="900" y="488" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#9B72CF">E4·不愿再失去</text>
  <text x="900" y="512" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">反击 + 1 · 质变星魂</text>

  <!-- Build info -->
  <rect x="625" y="555" width="550" height="50" rx="25" fill="#FFD6E8" fill-opacity="0.3" stroke="#D4789C" stroke-width="1"/>
  <text x="900" y="586" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#2D2D3D">制胜的瞬间 / 净庭教宗的圣骑士</text>

  <!-- Bottom source -->
  <text x="900" y="680" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#6B6B80">来源：B站 Wiki / Prydwen</text>
</svg>
