<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#F8F4F0"/>

  <!-- Left 40% image -->
  <image href="images/web_assets/dd_p05_origin.png" x="0" y="0" width="512" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="512" height="720" fill="#F8F4F0" fill-opacity="0.3"/>

  <!-- Right text area centered at x=900 -->

  <!-- Title -->
  <text x="900" y="80" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="36" font-weight="bold" fill="#D4789C">冰封身世：六相冰与记忆之谜</text>

  <!-- Card 1: 六相冰 -->
  <rect x="625" y="140" width="550" height="100" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="900" y="170" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="22" font-weight="bold" fill="#7EB8D8">六相冰</text>
  <text x="900" y="195" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#2D2D3D">封印三月七的神秘冰晶</text>
  <text x="900" y="218" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">可能与浮黎之力相关</text>

  <!-- Card 2: 失忆 -->
  <rect x="625" y="260" width="550" height="100" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="900" y="290" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="22" font-weight="bold" fill="#D4789C">失忆</text>
  <text x="900" y="315" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#2D2D3D">丧失全部过往记忆</text>
  <text x="900" y="338" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">以日期命名自己</text>

  <!-- Card 3: 浮黎关联 -->
  <rect x="625" y="380" width="550" height="100" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="900" y="410" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="22" font-weight="bold" fill="#9B72CF">浮黎关联</text>
  <text x="900" y="435" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#2D2D3D">星神浮黎掌管记忆</text>
  <text x="900" y="458" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">黑天鹅暗示了解秘密</text>

  <!-- Bottom source -->
  <text x="900" y="680" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#6B6B80">来源：游戏剧情 / NGA考据 / B站 Wiki</text>
</svg>
