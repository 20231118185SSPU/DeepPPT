<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#F8F4F0"/>

  <!-- Right 35% image -->
  <image href="images/web_assets/dd_p06_relationships.png" x="832" y="0" width="448" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="832" y="0" width="448" height="720" fill="#F8F4F0" fill-opacity="0.3"/>

  <!-- Left text area centered at x=400 -->

  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="36" font-weight="bold" fill="#D4789C">三月七的人物关系网</text>

  <!-- Column 1 (x=200) -->
  <!-- Entry 1: 开拓者 -->
  <rect x="25" y="140" width="350" height="110" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="200" y="175" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#D4789C">开拓者</text>
  <text x="200" y="200" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">最亲密的伙伴</text>
  <text x="200" y="222" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">共同经历无数冒险</text>

  <!-- Entry 2: 丹恒 -->
  <rect x="25" y="270" width="350" height="110" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="200" y="305" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#7EB8D8">丹恒</text>
  <text x="200" y="330" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">沉默可靠的同伴</text>
  <text x="200" y="352" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">彼此信任的列车家人</text>

  <!-- Entry 3: 姬子 -->
  <rect x="25" y="400" width="350" height="110" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="200" y="435" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#9B72CF">姬子</text>
  <text x="200" y="460" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">大姐姐般的照顾</text>
  <text x="200" y="482" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">温暖的列车长辈</text>

  <!-- Column 2 (x=600) -->
  <!-- Entry 4: 瓦尔特 -->
  <rect x="425" y="140" width="350" height="110" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#D4789C">瓦尔特</text>
  <text x="600" y="200" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">成熟的指引者</text>
  <text x="600" y="222" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">给予智慧与方向</text>

  <!-- Entry 5: 流萤 -->
  <rect x="425" y="270" width="350" height="110" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="600" y="305" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#7EB8D8">流萤</text>
  <text x="600" y="330" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">匹诺康尼挚友</text>
  <text x="600" y="352" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">梦境中结下的友谊</text>

  <!-- Entry 6: 黑天鹅 -->
  <rect x="425" y="400" width="350" height="110" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="600" y="435" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="20" font-weight="bold" fill="#9B72CF">黑天鹅</text>
  <text x="600" y="460" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B6B80">了解秘密之人</text>
  <text x="600" y="482" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">暗示三月七身世真相</text>

  <!-- Bottom source -->
  <text x="400" y="680" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#6B6B80">来源：游戏剧情 / Fandom Wiki</text>
</svg>
