<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#F8F4F0"/>

  <!-- Right 35% image -->
  <image href="images/web_assets/dd_p21_community.png" x="832" y="0" width="448" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="832" y="0" width="448" height="720" fill="#F8F4F0" fill-opacity="0.3"/>

  <!-- Left text area centered at x=400 -->

  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="36" font-weight="bold" fill="#D4789C">社区文化数据</text>

  <!-- 2x2 data callout grid (y=140-360) -->

  <!-- Pixiv -->
  <rect x="25" y="140" width="350" height="90" rx="12" fill="#F0ECF4" stroke="#D4789C" stroke-width="2"/>
  <text x="200" y="180" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#D4789C">万级</text>
  <text x="200" y="210" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">Pixiv 同人作品</text>

  <!-- 人气投票 -->
  <rect x="400" y="140" width="350" height="90" rx="12" fill="#F0ECF4" stroke="#7EB8D8" stroke-width="2"/>
  <text x="575" y="180" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#7EB8D8">Top 15</text>
  <text x="575" y="210" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">人气投票排名</text>

  <!-- UP卡池 -->
  <rect x="25" y="250" width="350" height="90" rx="12" fill="#F0ECF4" stroke="#9B72CF" stroke-width="2"/>
  <text x="200" y="290" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#9B72CF">8次</text>
  <text x="200" y="320" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">UP 卡池复刻</text>

  <!-- 皮肤数量 -->
  <rect x="400" y="250" width="350" height="90" rx="12" fill="#F0ECF4" stroke="#6B6B80" stroke-width="2"/>
  <text x="575" y="290" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="48" font-weight="bold" fill="#6B6B80">4款</text>
  <text x="575" y="320" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B6B80">皮肤数量</text>

  <!-- 3 culture cards (y=400-580) -->

  <!-- 梗文化 -->
  <rect x="25" y="400" width="236" height="120" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="143" y="435" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="18" font-weight="bold" fill="#D4789C">梗文化</text>
  <text x="143" y="462" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#2D2D3D">"拍照！我要</text>
  <text x="143" y="482" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#2D2D3D">拍下来！"</text>

  <!-- 粉丝生态 -->
  <rect x="275" y="400" width="236" height="120" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="393" y="435" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="18" font-weight="bold" fill="#7EB8D8">粉丝生态</text>
  <text x="393" y="462" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#2D2D3D">"老婆粉"与</text>
  <text x="393" y="482" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#2D2D3D">"妈妈粉"</text>

  <!-- Cosplay -->
  <rect x="525" y="400" width="236" height="120" rx="12" fill="#F0ECF4" stroke="#D0C8D8" stroke-width="2"/>
  <text x="643" y="435" text-anchor="middle" font-family="SimSun, Georgia, serif" font-size="18" font-weight="bold" fill="#9B72CF">Cosplay</text>
  <text x="643" y="462" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#2D2D3D">漫展出镜率</text>
  <text x="643" y="482" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#2D2D3D">最高之一</text>

  <!-- Bottom source -->
  <text x="400" y="680" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#6B6B80">来源：Pixiv / 米游社 / NGA</text>
</svg>
