    <rect x="0" y="660" width="1280" height="60" fill="#000000" fill-opacity="0.35" />
    <text x="60" y="695" fill="#FFFFFF" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">
