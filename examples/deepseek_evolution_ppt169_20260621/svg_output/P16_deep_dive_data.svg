<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- P16 Deep Dive Data - story_driven -->
    <rect width="1280" height="720" fill="#16162A" />

    <!-- Section label -->
    <text x="60" y="60" fill="#FFFFFF" fill-opacity="0.45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">§4 · 数据展开</text>

    <!-- Page title -->
    <text x="60" y="100" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="bold">MLA 原理图解</text>

    <!-- Three dots -->
    <circle cx="60" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.35" />
    <circle cx="74" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.25" />
    <circle cx="88" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.15" />

    <!-- Divider line -->
    <line x1="60" y1="145" x2="1220" y2="145" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" />

    <!-- Architecture image (left) -->
    <rect x="56" y="160" width="528" height="370" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.12" rx="6" />
    <image href="images/web_assets/web_mla_architecture.png" x="60" y="164" width="520" height="350" preserveAspectRatio="xMidYMid slice" />

    <!-- Data points (right) -->
    <text x="620" y="200" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="52" font-weight="bold">93%</text>
    <text x="620" y="230" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">KV 缓存压缩率 — 极大降低推理内存需求</text>

    <line x1="620" y1="250" x2="1220" y2="250" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" />

    <text x="620" y="300" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="44" font-weight="bold">236B</text>
    <text x="620" y="330" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">总参数量（MoE 架构）</text>

    <line x1="620" y1="350" x2="1220" y2="350" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" />

    <text x="620" y="400" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="44" font-weight="bold">21B</text>
    <text x="620" y="430" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">激活参数 — 仅 8.9% 参数参与推理</text>

    <line x1="620" y1="450" x2="1220" y2="450" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" />

    <text x="620" y="490" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">核心创新</text>
    <text x="620" y="520" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">MLA 通过低秩联合压缩，将 KV 缓存</text>
    <text x="620" y="544" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">从传统 MHA 的完整维度压缩到极小维度</text>

    <!-- Comparison image (bottom-right) -->
    <rect x="896" y="560" width="318" height="158" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.12" rx="6" />
    <image href="images/web_assets/web_mla_comparison.png" x="900" y="564" width="310" height="150" preserveAspectRatio="xMidYMid slice" />

    <!-- Source -->
    <text x="60" y="680" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">Source: DeepSeek-V2 Technical Report, 2024</text>

    <!-- Page number -->
    <text x="1220" y="708" text-anchor="end" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">16 / 30</text>
