<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- P13 Deep Dive Story - story_driven -->
    <rect width="1280" height="720" fill="#16162A" />

    <!-- Section label -->
    <text x="60" y="60" fill="#FFFFFF" fill-opacity="0.45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">§3 · 故事</text>

    <!-- Page title -->
    <text x="60" y="100" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="bold">幻方量化发展史</text>

    <!-- Three dots -->
    <circle cx="60" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.35" />
    <circle cx="74" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.25" />
    <circle cx="88" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.15" />

    <!-- Divider line -->
    <line x1="60" y1="145" x2="1220" y2="145" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" />

    <!-- Image (left) -->
    <rect x="56" y="160" width="528" height="370" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.12" rx="6" />
    <image href="images/P13_ai_highflyer.png" x="60" y="164" width="520" height="350" preserveAspectRatio="xMidYMid slice" />

    <!-- Timeline (right) -->
    <text x="620" y="185" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">关键里程碑</text>

    <!-- Timeline node 1 -->
    <circle cx="628" cy="220" r="4" fill="#FFFFFF" fill-opacity="0.6" />
    <text x="650" y="225" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">2015</text>
    <text x="650" y="248" fill="#FFFFFF" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">创立幻方量化，专注量化投资</text>
    <line x1="628" y1="258" x2="628" y2="280" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2" />

    <!-- Timeline node 2 -->
    <circle cx="628" cy="295" r="4" fill="#FFFFFF" fill-opacity="0.6" />
    <text x="650" y="300" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">2019</text>
    <text x="650" y="323" fill="#FFFFFF" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">管理规模突破 1000 亿人民币</text>
    <line x1="628" y1="333" x2="628" y2="355" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2" />

    <!-- Timeline node 3 -->
    <circle cx="628" cy="370" r="4" fill="#FFFFFF" fill-opacity="0.6" />
    <text x="650" y="375" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">2021</text>
    <text x="650" y="398" fill="#FFFFFF" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">自建 10,000+ A100 GPU 集群</text>
    <line x1="628" y1="408" x2="628" y2="430" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2" />

    <!-- Timeline node 4 -->
    <circle cx="628" cy="445" r="4" fill="#FFFFFF" fill-opacity="0.85" />
    <text x="650" y="450" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">2023</text>
    <text x="650" y="473" fill="#FFFFFF" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">成立 DeepSeek，全力进军 AGI</text>

    <!-- Key insight -->
    <rect x="620" y="500" width="600" height="80" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="920" y="530" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">核心洞察</text>
    <text x="920" y="560" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">量化基金的算力经验和对冲思维，造就了独特的 AI 研发路径</text>

    <!-- Source -->
    <text x="60" y="680" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">Source: High-Flyer Capital / DeepSeek public filings</text>

    <!-- Page number -->
    <text x="1220" y="708" text-anchor="end" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">13 / 30</text>
</svg>
