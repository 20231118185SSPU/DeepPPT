    <text x="756" y="427" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">开源改变格局</text>
    <text x="756" y="452" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">DeepSeek 最深远的武器</text>

    <rect x="664" y="518" width="560" height="110" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
