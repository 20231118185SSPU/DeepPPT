<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- P21 Deep Dive Story - story_driven -->
    <rect width="1280" height="720" fill="#16162A" />

    <!-- Section label -->
    <text x="60" y="60" fill="#FFFFFF" fill-opacity="0.45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">§5 · 故事</text>

    <!-- Page title -->
    <text x="60" y="100" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="bold">R1 训练流程详解</text>

    <!-- Three dots -->
    <circle cx="60" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.35" />
    <circle cx="74" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.25" />
    <circle cx="88" cy="128" r="3" fill="#FFFFFF" fill-opacity="0.15" />

    <!-- Divider line -->
    <line x1="60" y1="145" x2="1220" y2="145" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" />

    <!-- Pipeline image (left) -->
    <rect x="56" y="160" width="528" height="370" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.12" rx="6" />
    <image href="images/web_assets/web_r1_pipeline_wiki.png" x="60" y="164" width="520" height="350" preserveAspectRatio="xMidYMid slice" />

    <!-- Pipeline steps (right) -->
    <text x="620" y="185" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">训练四阶段</text>

    <!-- Step 1 -->
    <rect x="620" y="205" width="300" height="55" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="640" y="228" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Phase 1: 冷启动 SFT</text>
    <text x="640" y="248" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">少量高质量 CoT 数据微调</text>

    <!-- Arrow -->
    <text x="770" y="280" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">↓</text>

    <!-- Step 2 -->
    <rect x="620" y="295" width="300" height="55" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="640" y="318" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Phase 2: GRPO 强化学习</text>
    <text x="640" y="338" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">规则化奖励 + 无价值网络优化</text>

    <!-- Arrow -->
    <text x="770" y="370" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">↓</text>

    <!-- Step 3 -->
    <rect x="620" y="385" width="300" height="55" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="640" y="408" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Phase 3: 拒绝采样 + SFT</text>
    <text x="640" y="428" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">筛选最优推理路径，扩展训练数据</text>

    <!-- Arrow -->
    <text x="770" y="460" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">↓</text>

    <!-- Step 4 -->
    <rect x="620" y="475" width="300" height="55" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="640" y="498" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Phase 4: 最终 RL</text>
    <text x="640" y="518" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">混合推理 + 通用奖励，全场景对齐</text>

    <!-- Source -->
    <text x="60" y="680" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">Source: DeepSeek-R1 Technical Report, 2025</text>

    <!-- Page number -->
    <text x="1220" y="708" text-anchor="end" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">21 / 30</text>
</svg>
