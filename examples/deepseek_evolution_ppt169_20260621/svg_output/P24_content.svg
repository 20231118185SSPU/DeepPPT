<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- P24 Content - story_driven 03a variant -->
    <rect width="1280" height="720" fill="#16162A" />

    <!-- Section label -->
    <text x="60" y="60" fill="#FFFFFF" fill-opacity="0.45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">§6 行业冲击</text>

    <!-- Page title -->
    <text x="60" y="108" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="bold">Sputnik 时刻</text>

    <!-- Three dots -->
    <circle cx="60" cy="135" r="3" fill="#FFFFFF" fill-opacity="0.35" />
    <circle cx="74" cy="135" r="3" fill="#FFFFFF" fill-opacity="0.25" />
    <circle cx="88" cy="135" r="3" fill="#FFFFFF" fill-opacity="0.15" />

    <!-- Content image frame -->
    <rect x="56" y="116" width="1168" height="418" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.12" rx="6" />
    <image href="images/P24_content_sputnik.png" x="60" y="120" width="1160" height="410" preserveAspectRatio="xMidYMid slice" />

    <!-- Big number overlay -->
    <text x="640" y="380" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.15" font-family="Microsoft YaHei, Arial, sans-serif" font-size="120" font-weight="bold">$593B</text>

    <!-- Caption -->
    <text x="60" y="568" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">美股史上最大单日个股市值损失</text>

    <!-- Divider line -->
    <line x1="60" y1="590" x2="1220" y2="590" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" />

    <!-- Takeaway with accent bar -->
    <rect x="1200" y="610" width="3" height="24" fill="#FFFFFF" fill-opacity="0.3" />
    <text x="60" y="628" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">AI板块蒸发超1万亿美元</text>

    <!-- Page number -->
    <text x="1220" y="708" text-anchor="end" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">24 / 30</text>
</svg>
