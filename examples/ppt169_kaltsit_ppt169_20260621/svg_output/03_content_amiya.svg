<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#0A1628" />
    <text x="60" y="55" fill="#1A5C5C" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">冷面 · 03</text>
    <text x="60" y="85" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold">"Don't touch Amiya."</text>
    <line x1="60" y1="98" x2="360" y2="98" stroke="#1A5C5C" stroke-width="2" stroke-opacity="0.3" />
    <image href="images/P10_content_amiya.png" x="60" y="115" width="1160" height="425" preserveAspectRatio="xMidYMid slice" />
    <text x="60" y="570" fill="#E8E8E8" fill-opacity="0.65" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">全明日方舟最具标志性的保护性台词——反复检查戒指，隐瞒魔王命运</text>
    <line x1="60" y1="600" x2="1220" y2="600" stroke="#1A5C5C" stroke-width="1" stroke-opacity="0.15" />
    <text x="60" y="640" fill="#D4A848" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">"阿米娅还是个孩子，你也该多陪陪她" ——凯尔希对博士说</text>
    <rect x="1200" y="620" width="20" height="3" fill="#D4A848" fill-opacity="0.3" /><rect x="1200" y="628" width="14" height="3" fill="#D4A848" fill-opacity="0.2" />
</svg>