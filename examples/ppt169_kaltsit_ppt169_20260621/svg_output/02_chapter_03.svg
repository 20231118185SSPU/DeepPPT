<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#0A1628" />
    <image href="images/P09_transition_warmth.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="1280" height="720" fill="#0A1628" fill-opacity="0.55" />
    <text x="60" y="200" fill="#E8E8E8" fill-opacity="0.45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">巴别塔</text>
    <text x="60" y="240" fill="#E8E8E8" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">特蕾西娅的死是凯尔希万年生命中最深的伤口</text>
    <text x="60" y="360" fill="#1A5C5C" fill-opacity="0.15" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="120" font-weight="bold">03</text>
    <text x="60" y="430" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="bold">冷面下的温度</text>
    <text x="60" y="480" fill="#E8E8E8" fill-opacity="0.75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">但在冰冷的外表下，凯尔希也有她拼尽全力想要保护的人</text>
    <line x1="60" y1="530" x2="400" y2="530" stroke="#1A5C5C" stroke-width="1" stroke-opacity="0.3" />
    <text x="60" y="570" fill="#E8E8E8" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">从阿米娅到爱国者——她的温柔从不宣之于口</text>
</svg>