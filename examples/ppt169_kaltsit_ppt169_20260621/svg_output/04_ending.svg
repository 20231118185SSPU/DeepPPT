<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#0A1628" />
    <image href="images/P18_ending_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="180" width="1280" height="400" fill="#0A1628" fill-opacity="0.65" />
    <line x1="440" y1="250" x2="840" y2="250" stroke="#1A5C5C" stroke-width="2" stroke-opacity="0.5" />
    <text x="640" y="305" text-anchor="middle" fill="#E8E8E8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-style="italic">"凯尔希，我感受到你的孤独。</text>
    <text x="640" y="345" text-anchor="middle" fill="#E8E8E8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-style="italic">因为你觉得没有同类。</text>
    <text x="640" y="385" text-anchor="middle" fill="#E8E8E8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-style="italic">我希望罗德岛能成为你命名的家</text>
    <text x="640" y="425" text-anchor="middle" fill="#E8E8E8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-style="italic">——一个你永远可以回来的岛屿。"</text>
    <text x="640" y="475" text-anchor="middle" fill="#D4A848" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">——特蕾西娅 致凯尔希</text>
    <rect x="0" y="660" width="1280" height="60" fill="#000000" fill-opacity="0.35" />
    <text x="640" y="695" text-anchor="middle" fill="#E8E8E8" fill-opacity="0.7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">明日方舟深度研究 | 2026</text>
</svg>
