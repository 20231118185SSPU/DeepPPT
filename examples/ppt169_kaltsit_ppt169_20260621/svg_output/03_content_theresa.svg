<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#0A1628" />
    <text x="60" y="55" fill="#1A5C5C" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">巴别塔 · 02</text>
    <text x="60" y="85" fill="#E8E8E8" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold">特蕾西娅：跨越世纪的羁绊</text>
    <line x1="60" y1="98" x2="360" y2="98" stroke="#1A5C5C" stroke-width="2" stroke-opacity="0.3" />
    <image href="images/P07_content_theresa.png" x="60" y="115" width="1160" height="425" preserveAspectRatio="xMidYMid slice" />
    <text x="60" y="570" fill="#E8E8E8" fill-opacity="0.65" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">共同创建巴别塔——为感染者权益奋斗了数百年</text>
    <line x1="60" y1="600" x2="1220" y2="600" stroke="#1A5C5C" stroke-width="1" stroke-opacity="0.15" />
    <text x="60" y="640" fill="#D4A848" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">"我希望罗德岛能成为你命名的家" ——特蕾西娅的告别信</text>
    <rect x="1200" y="620" width="20" height="3" fill="#D4A848" fill-opacity="0.3" /><rect x="1200" y="628" width="14" height="3" fill="#D4A848" fill-opacity="0.2" />
