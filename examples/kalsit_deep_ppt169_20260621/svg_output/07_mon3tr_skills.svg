<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117"/>

  <!-- Background image - scene -->
  <image href="../images/scene_manifest.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" fill-opacity="0.3"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.7"/>

  <!-- Section label -->
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">
    战斗体系
  </text>

  <!-- Title -->
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">
    Mon3tr
  </text>
  <text x="80" y="155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8B949E">
    核心战斗伙伴 · THE CORE COMPANION
  </text>

  <!-- Divider -->
  <rect x="80" y="175" width="1120" height="1" fill="#30363D"/>

  <!-- Mon3tr info card -->
  <rect x="80" y="200" width="480" height="200" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <!-- Mon3tr icon -->
  <use data-icon="tabler-outline/paw" x="100" y="220" width="32" height="32" fill="none" stroke="#58A6FF" stroke-width="2"/>

  <text x="145" y="235" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">
    Mon3tr 召唤物
  </text>

  <text x="100" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">
    独立召唤作战单位
  </text>
  <text x="100" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">
    再部署时间：25秒（精英2）
  </text>
  <text x="100" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">
    凯尔希优先治疗自身和Mon3tr
  </text>
  <text x="100" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">
    凯尔希离场时Mon3tr同时撤退
  </text>
  <text x="100" y="375" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#F85149">
    Mon3tr不在攻击范围内时防御力降至0
  </text>

  <!-- Talent: Indestructible Reconstruction -->
  <rect x="80" y="420" width="480" height="100" rx="8" fill="#161B22" stroke="#3FB950" stroke-width="1"/>
  <use data-icon="tabler-outline/shield" x="100" y="435" width="24" height="24" fill="none" stroke="#3FB950" stroke-width="2"/>
  <text x="135" y="450" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#3FB950">
    天赋 · 不毁重构
  </text>
  <text x="100" y="480" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">
    Mon3tr被击倒后使周围8格内敌人
  </text>
  <text x="100" y="505" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">
    晕眩3秒并造成 <tspan fill="#58A6FF" font-weight="bold">1200点真实伤害</tspan>
  </text>

  <!-- Skills section -->
  <text x="620" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E" letter-spacing="2">
    技能体系
  </text>

  <!-- Skill 1 -->
  <rect x="620" y="220" width="580" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="620" y="220" width="4" height="80" fill="#58A6FF"/>
  <use data-icon="tabler-outline/shield" x="640" y="235" width="20" height="20" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="670" y="248" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">
    指令 · 结构加固
  </text>
  <text x="670" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">
    自身和Mon3tr防御力 +150%  |  自身物理格挡 50%
  </text>
  <text x="670" y="288" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6E7681">
    持续40秒 · 消耗20技力
  </text>

  <!-- Skill 2 -->
  <rect x="620" y="310" width="580" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="620" y="310" width="4" height="80" fill="#3FB950"/>
  <use data-icon="tabler-outline/bolt" x="640" y="325" width="20" height="20" fill="none" stroke="#3FB950" stroke-width="2"/>
  <text x="670" y="338" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">
    指令 · 战术协同
  </text>
  <text x="670" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">
    攻速 +100  |  Mon3tr攻击力 +90%  |  可攻击阻挡所有敌人
  </text>
  <text x="670" y="378" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6E7681">
    持续20秒 · 消耗8技力
  </text>

  <!-- Skill 3 - Ultimate -->
  <rect x="620" y="400" width="580" height="80" rx="8" fill="#161B22" stroke="#F85149" stroke-width="1"/>
  <rect x="620" y="400" width="4" height="80" fill="#F85149"/>
  <use data-icon="tabler-outline/sword" x="640" y="415" width="20" height="20" fill="none" stroke="#F85149" stroke-width="2"/>
  <text x="670" y="428" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#F85149">
    指令 · 熔毁
  </text>
  <text x="670" y="450" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">
    Mon3tr防御 +200%  |  攻击 +260%逐渐降低  |  真实伤害
  </text>
  <text x="670" y="468" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#F85149">
    高风险高回报 · 未击杀敌人则流失50%生命
  </text>

  <!-- Bottom insight -->
  <rect x="620" y="510" width="580" height="1" fill="#30363D"/>
  <text x="620" y="545" font-family="Georgia, SimSun, serif" font-size="16" fill="#58A6FF" font-style="italic">
    "Mon3tr和我会保护所有人的，特别是博士你。"
  </text>

  <!-- Page number -->
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">
    06 / 10
  </text>
</svg>
