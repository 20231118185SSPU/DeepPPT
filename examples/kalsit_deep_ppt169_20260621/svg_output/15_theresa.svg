<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117"/>
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">第四章 · 人物关系</text>
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">特蕾西娅</text>
  <rect x="80" y="145" width="1120" height="1" fill="#30363D"/>
  
  <image href="../images/scene_footprint.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.7"/>
  <rect x="80" y="170" width="500" height="300" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="1"/>
  <rect x="80" y="170" width="500" height="4" rx="2" fill="#58A6FF"/>
  <use data-icon="tabler-outline/crown" x="100" y="195" width="28" height="28" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="140" y="215" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">特蕾西娅</text>
  <text x="140" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">Theresa · 前萨卡兹之王</text>
  <rect x="100" y="260" width="460" height="1" fill="#30363D"/>
  <text x="100" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">跨越极长时间的同伴</text>
  <text x="100" y="315" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">从对手/敌人到深厚的同伴</text>
  <text x="100" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">巴别塔的建立者之一</text>
  <text x="100" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">被特雷西斯刺杀后，巴别塔倒塌</text>
  <text x="100" y="400" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">凯尔希对特蕾西娅怀有深厚的感情与愧疚</text>
  <text x="100" y="430" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">特蕾西娅的死是凯尔希心中永远的痛</text>

  <rect x="620" y="170" width="580" height="300" rx="8" fill="#161B22" fill-opacity="0.8" stroke="#30363D" stroke-width="1"/>
  <rect x="620" y="170" width="3" height="300" fill="#58A6FF"/>
  <text x="650" y="210" font-family="Georgia, SimSun, serif" font-size="18" fill="#FFFFFF" font-style="italic">"我不是你的同类，凯尔希。</text>
  <text x="650" y="240" font-family="Georgia, SimSun, serif" font-size="18" fill="#FFFFFF" font-style="italic">我没法开解你的疑惑。</text>
  <text x="650" y="280" font-family="Georgia, SimSun, serif" font-size="18" fill="#58A6FF" font-style="italic">但我一直是你的同伴。</text>
  <text x="650" y="310" font-family="Georgia, SimSun, serif" font-size="18" fill="#58A6FF" font-style="italic">之后依然也是。"</text>
  <text x="650" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">—— 特蕾西娅写给凯尔希的信</text>
  <rect x="650" y="380" width="520" height="1" fill="#30363D"/>
  <text x="650" y="410" font-family="Georgia, SimSun, serif" font-size="16" fill="#D4AF37" font-style="italic">"我希望这艘罗德岛能成为你的家。"</text>
  <text x="650" y="440" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">—— 特蕾西娅</text>
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">14 / 32</text>
</svg>