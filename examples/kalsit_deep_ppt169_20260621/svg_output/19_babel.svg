<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <image href="../images/babel_avatar_奥达.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.75"/>
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">第四章 · 历史</text>
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">巴别塔</text>
  <rect x="80" y="145" width="1120" height="1" fill="#30363D"/>
  
  <rect x="80" y="170" width="540" height="300" rx="8" fill="#161B22" stroke="#D4AF37" stroke-width="1"/>
  <rect x="80" y="170" width="540" height="4" rx="2" fill="#D4AF37"/>
  <text x="100" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#D4AF37">巴别塔</text>
  <text x="100" y="235" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">Babel · 罗德岛的前身</text>
  <rect x="100" y="255" width="500" height="1" fill="#30363D"/>
  <text x="100" y="285" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">由特蕾西娅和凯尔希共同建立</text>
  <text x="100" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">最初为萨卡兹服务的组织</text>
  <text x="100" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">特蕾西娅被刺杀后，巴别塔倒塌</text>
  <text x="100" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">凯尔希宣布不再单纯为萨卡兹服务</text>
  <text x="100" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">以矿石病医治为新议题，重建为罗德岛</text>
  <text x="100" y="415" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">"一种破除成见的观念……是需要土壤的"</text>

  <rect x="660" y="170" width="540" height="300" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="680" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">巴别塔倒塌后的转变</text>
  <rect x="680" y="230" width="500" height="1" fill="#30363D"/>
  <text x="680" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">凯尔希离开卡兹戴尔</text>
  <text x="680" y="285" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">将巴别塔改组为罗德岛</text>
  <text x="680" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">以矿石病研究与治疗为核心</text>
  <text x="680" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">收容感染者，寻找治愈方法</text>
  <rect x="680" y="365" width="500" height="1" fill="#30363D"/>
  <text x="680" y="395" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF">"我会抚养她。"</text>
  <text x="680" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">—— 凯尔希关于阿米娅的宣言</text>
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">18 / 32</text>
</svg>