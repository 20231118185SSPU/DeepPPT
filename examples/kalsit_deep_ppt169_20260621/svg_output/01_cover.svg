<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background image -->
  <image href="../images/kalsit_main_scene_始发.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>

  <!-- Dark overlay scrim for legibility -->
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.55"/>

  <!-- Top decorative line -->
  <rect x="100" y="180" width="80" height="2" fill="#58A6FF" fill-opacity="0.8"/>

  <!-- Subtitle above main title -->
  <text x="100" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8B949E" letter-spacing="4">
    ARKNIGHTS · 明日方舟 · 角色档案
  </text>

  <!-- Main title -->
  <text x="100" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" letter-spacing="8">
    凯尔希
  </text>

  <!-- English name -->
  <text x="100" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" fill="#58A6FF" letter-spacing="2">
    Kal'tsit
  </text>

  <!-- Tagline -->
  <text x="100" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#C9D1D9">
    她来自过去。她属于现在。
  </text>

  <!-- Bottom decorative elements -->
  <rect x="100" y="580" width="400" height="1" fill="#30363D"/>

  <!-- Role tags -->
  <rect x="100" y="600" width="80" height="28" rx="4" fill="none" stroke="#58A6FF" stroke-width="1"/>
  <text x="140" y="619" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#58A6FF" text-anchor="middle">
    ★★★★★★
  </text>

  <rect x="192" y="600" width="60" height="28" rx="4" fill="none" stroke="#3FB950" stroke-width="1"/>
  <text x="222" y="619" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#3FB950" text-anchor="middle">
    医疗
  </text>

  <rect x="264" y="600" width="70" height="28" rx="4" fill="none" stroke="#3FB950" stroke-width="1"/>
  <text x="299" y="619" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#3FB950" text-anchor="middle">
    罗德岛
  </text>

  <!-- Page number -->
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">
    01 / 10
  </text>
</svg>
