<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <image href="../images/babel_avatar_敌人_爆燃厨具巨人.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.75"/>

  <!-- Section label -->
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">
    内在世界
  </text>

  <!-- Title -->
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">
    灵魂的底色
  </text>
  <text x="80" y="155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8B949E">
    THE ESSENCE OF A SOUL
  </text>

  <!-- Divider -->
  <rect x="80" y="175" width="1120" height="1" fill="#30363D"/>

  <!-- 2x2 Grid of personality cards -->
  <!-- Card 1: Cold Rationality -->
  <rect x="80" y="200" width="540" height="200" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="80" y="200" width="540" height="4" rx="2" fill="#58A6FF"/>

  <use data-icon="tabler-outline/chart-bar" x="100" y="225" width="28" height="28" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="140" y="243" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">
    冷静理性
  </text>
  <text x="140" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">
    COLD RATIONALITY
  </text>

  <rect x="100" y="285" width="500" height="1" fill="#30363D"/>
  <text x="100" y="315" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#C9D1D9">
    被描述为冷静、精于计算，有时显得冷淡
  </text>
  <text x="100" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    万年的经历让她学会了用理性压制情感
  </text>
  <text x="100" y="375" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    每一个决定都经过深思熟虑
  </text>

  <!-- Card 2: Knowledgeable -->
  <rect x="660" y="200" width="540" height="200" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="660" y="200" width="540" height="4" rx="2" fill="#3FB950"/>

  <use data-icon="tabler-outline/file-text" x="680" y="225" width="28" height="28" fill="none" stroke="#3FB950" stroke-width="2"/>
  <text x="720" y="243" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">
    知识渊博
  </text>
  <text x="720" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">
    VAST KNOWLEDGE
  </text>

  <rect x="680" y="285" width="500" height="1" fill="#30363D"/>
  <text x="680" y="315" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#C9D1D9">
    横跨冶金、社会学、源石技艺、考古学等多领域
  </text>
  <text x="680" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    万年的学习与积累，让她成为活的百科全书
  </text>
  <text x="680" y="375" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    对泰拉文明有着超越常人的理解
  </text>

  <!-- Card 3: Guardian -->
  <rect x="80" y="420" width="540" height="200" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="80" y="420" width="540" height="4" rx="2" fill="#D4AF37"/>

  <use data-icon="tabler-outline/shield" x="100" y="445" width="28" height="28" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <text x="140" y="463" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">
    守护者
  </text>
  <text x="140" y="485" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">
    THE GUARDIAN
  </text>

  <rect x="100" y="505" width="500" height="1" fill="#30363D"/>
  <text x="100" y="535" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#C9D1D9">
    内心深处有着强烈的保护欲
  </text>
  <text x="100" y="565" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    "我的愿望就是守护好你和阿米娅的愿望"
  </text>
  <text x="100" y="595" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    用行动而非言语表达关怀
  </text>

  <!-- Card 4: Lonely Traveler -->
  <rect x="660" y="420" width="540" height="200" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="660" y="420" width="540" height="4" rx="2" fill="#F85149"/>

  <use data-icon="tabler-outline/history" x="680" y="445" width="28" height="28" fill="none" stroke="#F85149" stroke-width="2"/>
  <text x="720" y="463" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">
    孤独旅人
  </text>
  <text x="720" y="485" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">
    THE LONELY WANDERER
  </text>

  <rect x="680" y="505" width="500" height="1" fill="#30363D"/>
  <text x="680" y="535" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#C9D1D9">
    万年的旅途承载了常人无法想象的孤独
  </text>
  <text x="680" y="565" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    "没有过去，也没有将来"
  </text>
  <text x="680" y="595" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">
    无数次的相遇与离别，铸就了她的沉默
  </text>

  <!-- Page number -->
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">
    09 / 10
  </text>
</svg>
