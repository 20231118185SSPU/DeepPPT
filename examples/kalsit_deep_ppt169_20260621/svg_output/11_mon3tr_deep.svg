<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117"/>
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">第三章 · 战斗体系</text>
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">Mon3tr 详解</text>
  <rect x="80" y="145" width="1120" height="1" fill="#30363D"/>
  
  <image href="../images/scene_manifest.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.7"/>
  <rect x="80" y="170" width="480" height="200" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <use data-icon="tabler-outline/paw" x="100" y="190" width="32" height="32" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="145" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Mon3tr 召唤物</text>
  <text x="100" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">独立召唤作战单位</text>
  <text x="100" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">再部署时间：25秒（精英2）</text>
  <text x="100" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">凯尔希优先治疗自身和Mon3tr</text>
  <text x="100" y="315" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">凯尔希离场时Mon3tr同时撤退</text>
  <text x="100" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#F85149">Mon3tr不在攻击范围内时防御力降至0</text>
  <rect x="80" y="390" width="480" height="100" rx="8" fill="#161B22" stroke="#3FB950" stroke-width="1"/>
  <use data-icon="tabler-outline/shield" x="100" y="405" width="24" height="24" fill="none" stroke="#3FB950" stroke-width="2"/>
  <text x="135" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#3FB950">天赋 · 不毁重构</text>
  <text x="100" y="450" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">Mon3tr被击倒后使周围8格内敌人</text>
  <text x="100" y="475" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">晕眩3秒并造成 <tspan fill="#58A6FF" font-weight="bold">1200点真实伤害</tspan></text>
  <rect x="620" y="170" width="580" height="120" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="640" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Mon3tr 战斗数据</text>
  <text x="640" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">阻挡数：1 | 攻击间隔：1.3s</text>
  <text x="640" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8B949E">物理伤害 | 生命值随等级提升</text>
  <rect x="620" y="310" width="580" height="120" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="640" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#58A6FF">战术定位</text>
  <text x="640" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">Mon3tr是凯尔希的核心战斗伙伴</text>
  <text x="640" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">既能输出又能阻挡，配合凯尔希治疗</text>
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">11 / 32</text>
</svg>