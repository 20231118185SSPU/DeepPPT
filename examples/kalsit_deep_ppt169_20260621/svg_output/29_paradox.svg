<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <image href="../images/kalsit_portrait_1.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.75"/>
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">第五章 · 悖论模拟</text>
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">悖论模拟</text>
  <rect x="80" y="145" width="1120" height="1" fill="#30363D"/>
  
  <rect x="80" y="170" width="1120" height="150" rx="8" fill="#161B22" stroke="#D4AF37" stroke-width="1"/>
  <rect x="80" y="170" width="1120" height="4" rx="2" fill="#D4AF37"/>
  <text x="100" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#D4AF37">悖论模拟：文明切片</text>
  <text x="100" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">首次掉落：合成玉×200</text>
  <text x="100" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">解锁条件：精英2等级1</text>
  <text x="100" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">可用干员：凯尔希与红</text>
  <text x="100" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">敌方包含"皇帝的利刃"追猎者和帝国前锋精锐</text>

  <rect x="80" y="340" width="540" height="150" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="100" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">关卡特色</text>
  <text x="100" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">排气格栅部署的干员不会成为远程攻击目标</text>
  <text x="100" y="435" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">需要合理利用地形和技能机制</text>
  <text x="100" y="460" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">考验玩家对凯尔希技能的理解和运用</text>

  <rect x="660" y="340" width="540" height="150" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="680" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">干员密录</text>
  <text x="680" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">标题："长路至此"</text>
  <text x="680" y="435" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">"为什么偏偏是医生，凯尔希？"</text>
  <text x="680" y="460" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">需精英2等级1及50%信赖解锁</text>

  <rect x="80" y="510" width="1120" height="50" rx="8" fill="#161B22" fill-opacity="0.5" stroke="#30363D" stroke-width="1"/>
  <text x="100" y="540" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">悖论模拟和干员密录进一步丰富了凯尔希的角色形象和背景故事</text>
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">26 / 32</text>
</svg>