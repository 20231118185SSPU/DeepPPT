  <text x="120" y="350" font-family="Georgia, SimSun, serif" font-size="22" fill="#C9D1D9" font-style="italic">"比你所见的片段还要漫长，</text>
  <text x="120" y="380" font-family="Georgia, SimSun, serif" font-size="22" fill="#C9D1D9" font-style="italic">漫长千倍万倍，特蕾西娅。"</text>
