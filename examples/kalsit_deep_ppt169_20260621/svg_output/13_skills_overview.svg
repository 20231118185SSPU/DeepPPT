  <text x="860" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">终极技能</text>
  <text x="860" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">Mon3tr防御 +200% | 攻击 +260%</text>
  <text x="860" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">伤害类型变为真实伤害</text>
  <text x="860" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#F85149">未击杀敌人则流失50%生命</text>
  <text x="860" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">高风险高回报，真实伤害无视防御</text>

  <rect x="80" y="400" width="1120" height="120" rx="8" fill="#161B22" fill-opacity="0.5" stroke="#30363D" stroke-width="1"/>
  <rect x="80" y="400" width="4" height="120" fill="#58A6FF"/>
  <text x="110" y="435" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#FFFFFF">技能选择建议</text>
  <text x="110" y="465" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">日常推图：技能2（战术协同）— 攻守兼备，使用频率最高</text>
  <text x="110" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">高难关卡：技能3（熔毁）— 真实伤害对高防敌人极为有效</text>
  <text x="110" y="505" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">技能1（结构加固）适合需要Mon3tr长时间站场的防御型打法</text>
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">12 / 32</text>
