  <text x="480" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">攻守兼备</text>
  <text x="480" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">攻速 +100 | Mon3tr攻击 +90%</text>
  <text x="480" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">Mon3tr可攻击阻挡的所有敌人</text>
  <text x="480" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681">持续20秒 · 消耗8技力</text>
  <text x="480" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">最常用技能，攻守兼备</text>

  <rect x="840" y="170" width="360" height="200" rx="8" fill="#161B22" stroke="#F85149" stroke-width="1"/>
  <rect x="840" y="170" width="360" height="4" rx="2" fill="#F85149"/>
  <use data-icon="tabler-outline/sword" x="860" y="195" width="24" height="24" fill="none" stroke="#F85149" stroke-width="2"/>
