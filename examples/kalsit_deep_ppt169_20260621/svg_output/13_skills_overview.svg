<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <image href="../images/mon3tr_icon.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.75"/>
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">第三章 · 技能体系</text>
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">技能总览</text>
  <rect x="80" y="145" width="1120" height="1" fill="#30363D"/>
  
  <rect x="80" y="170" width="360" height="200" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="1"/>
  <rect x="80" y="170" width="360" height="4" rx="2" fill="#58A6FF"/>
  <use data-icon="tabler-outline/shield" x="100" y="195" width="24" height="24" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <text x="135" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">指令 · 结构加固</text>
  <text x="100" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">防御型</text>
  <text x="100" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">自身和Mon3tr防御力 +150%</text>
  <text x="100" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">自身物理格挡 50%</text>
  <text x="100" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681">持续40秒 · 消耗20技力</text>
  <text x="100" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">适合需要Mon3tr长时间站场的场景</text>

  <rect x="460" y="170" width="360" height="200" rx="8" fill="#161B22" stroke="#3FB950" stroke-width="1"/>
  <rect x="460" y="170" width="360" height="4" rx="2" fill="#3FB950"/>
  <use data-icon="tabler-outline/bolt" x="480" y="195" width="24" height="24" fill="none" stroke="#3FB950" stroke-width="2"/>
