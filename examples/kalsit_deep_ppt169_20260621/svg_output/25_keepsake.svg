<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <image href="../images/kalsit_avatar.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.75"/>

  <!-- Large centered content - negative space dominant -->

  <!-- Section label -->
  <rect x="540" y="140" width="200" height="2" fill="#58A6FF"/>
  <text x="640" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="4" text-anchor="middle">
    内在世界
  </text>

  <!-- Main title -->
  <text x="640" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">
    信物
  </text>

  <!-- English -->
  <text x="640" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#8B949E" text-anchor="middle">
    THE KEEPSAKE
  </text>

  <!-- Decorative divider -->
  <rect x="590" y="330" width="100" height="1" fill="#30363D"/>

  <!-- Watch illustration - simplified SVG watch -->
  <circle cx="640" cy="430" r="60" fill="none" stroke="#58A6FF" stroke-width="2"/>
  <circle cx="640" cy="430" r="55" fill="none" stroke="#30363D" stroke-width="1"/>
  <!-- Watch hands -->
  <line x1="640" y1="430" x2="640" y2="390" stroke="#C9D1D9" stroke-width="2" stroke-linecap="round"/>
  <line x1="640" y1="430" x2="665" y2="440" stroke="#C9D1D9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Watch crown -->
  <rect x="698" y="425" width="8" height="10" rx="2" fill="none" stroke="#58A6FF" stroke-width="1.5"/>
  <!-- Watch lugs -->
  <line x1="620" y1="370" x2="615" y2="355" stroke="#30363D" stroke-width="2" stroke-linecap="round"/>
  <line x1="660" y1="370" x2="665" y2="355" stroke="#30363D" stroke-width="2" stroke-linecap="round"/>

  <!-- Description -->
  <text x="640" y="530" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#C9D1D9" text-anchor="middle">
    一个奇特的怀表，制式独特
  </text>

  <text x="640" y="565" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8B949E" text-anchor="middle">
    上面刻有四个年份日期
  </text>

  <text x="640" y="595" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8B949E" text-anchor="middle">
    及歪歪扭扭的几个字母
  </text>

  <!-- Bottom interpretation -->
  <rect x="440" y="630" width="400" height="1" fill="#30363D"/>
  <text x="640" y="660" font-family="Georgia, SimSun, serif" font-size="14" fill="#6E7681" text-anchor="middle" font-style="italic">
    承载着万年旅途的记忆与时间的重量
  </text>

  <!-- Page number -->
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">
    08 / 10
  </text>
</svg>
