<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117"/>
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">第四章 · 组织</text>
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">罗德岛</text>
  <rect x="80" y="145" width="1120" height="1" fill="#30363D"/>
  
  <image href="../images/closure_scene_始发.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.7"/>
  <rect x="80" y="170" width="540" height="250" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="1"/>
  <text x="100" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#58A6FF">罗德岛</text>
  <text x="100" y="235" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8B949E">Rhodes Island · 制药公司/军事组织</text>
  <rect x="100" y="255" width="500" height="1" fill="#30363D"/>
  <text x="100" y="285" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">前身为巴别塔，凯尔希是创始成员之一</text>
  <text x="100" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">以矿石病研究与治疗为核心使命</text>
  <text x="100" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">凯尔希在此找到了"家"的感觉</text>
  <text x="100" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">承载着特蕾西娅的遗志与希望</text>
  <text x="100" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">"我希望这艘罗德岛能成为你的家。"</text>

  <rect x="660" y="170" width="540" height="250" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="680" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">凯尔希在罗德岛的角色</text>
  <rect x="680" y="230" width="500" height="1" fill="#30363D"/>
  <text x="680" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">高层管理人员之一</text>
  <text x="680" y="285" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">医疗项目领头人</text>
  <text x="680" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">战略指挥系统核心成员</text>
  <text x="680" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">实际控制者与运营核心</text>
  <text x="680" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">虽然博士是名义上的指挥官，但凯尔希是实际运营者</text>
  <text x="680" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">她的决策影响着罗德岛的每一个方向</text>
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">17 / 32</text>
</svg>