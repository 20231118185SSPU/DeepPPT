<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <image href="../images/kalsit_enemy_avatar_敌人_凯尔希.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#0D1117" fill-opacity="0.75"/>
  <rect x="80" y="50" width="60" height="2" fill="#58A6FF"/>
  <text x="80" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#58A6FF" letter-spacing="2">第五章 · 内在世界</text>
  <text x="80" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">档案资料</text>
  <rect x="80" y="145" width="1120" height="1" fill="#30363D"/>
  
  <rect x="80" y="170" width="1120" height="120" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="80" y="170" width="4" height="120" fill="#58A6FF"/>
  <text x="110" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#58A6FF">档案资料一（信赖50%）</text>
  <text x="110" y="235" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">凯尔希谈论哥伦比亚的建立与维多利亚撤军的关系</text>
  <text x="110" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">分析边境领公爵的失败，指出维多利亚刻意不派支援</text>
  <text x="110" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">"卡兹戴尔的下一场劫难，也可能会是它带来的。"</text>

  <rect x="80" y="310" width="1120" height="120" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="80" y="310" width="4" height="120" fill="#3FB950"/>
  <text x="110" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#3FB950">档案资料二（信赖100%）</text>
  <text x="110" y="375" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">以莱塔尼亚学者身份发出的紧急消息</text>
  <text x="110" y="400" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">关于伊比利亚遭遇大灾难——所有讯号中断</text>
  <text x="110" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">"仿佛整个南方都就此消失"</text>

  <rect x="80" y="450" width="1120" height="120" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="80" y="450" width="4" height="120" fill="#D4AF37"/>
  <text x="110" y="485" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#D4AF37">档案资料三（信赖150%）</text>
  <text x="110" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">巴别塔倒塌后的会议记录</text>
  <text x="110" y="540" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9D1D9">凯尔希宣布不再单纯为萨卡兹服务，将离开卡兹戴尔</text>
  <text x="110" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#8B949E">"一种破除成见的观念……是需要土壤的"</text>
  <text x="1220" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6E7681" text-anchor="end">20 / 32</text>
</svg>