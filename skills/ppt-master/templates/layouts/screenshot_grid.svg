<?xml version="1.0" encoding="UTF-8"?>
<!-- screenshot_grid.svg — 截图对比网格版式
     用途：项目对比、前后对比、A/B 展示
     占位标记：TITLE, LEFT_LABEL, RIGHT_LABEL,
               SCREENSHOT_L1..L3, SCREENSHOT_R1..R3, TABLE_AREA
     截图区域：每张 550x162，3 行 × 2 列，底部留 80px 给对比表
-->
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <g id="screenshot-grid">
        <!-- Background -->
        <rect width="1280" height="720" fill="#0D1117"/>

        <!-- Title -->
        <rect x="60" y="30" width="60" height="3" fill="#00D4FF" rx="1.5"/>
        <text x="60" y="70" fill="#E6EDF3" font-family="Microsoft YaHei, Inter, sans-serif"
            font-size="32" font-weight="bold">{{TITLE}}</text>

        <!-- Column labels -->
        <text x="335" y="105" text-anchor="middle" fill="#00D4FF" fill-opacity="0.7"
            font-family="Microsoft YaHei, Inter, sans-serif" font-size="15" font-weight="bold">{{LEFT_LABEL}}</text>
        <text x="945" y="105" text-anchor="middle" fill="#FF6B6B" fill-opacity="0.7"
            font-family="Microsoft YaHei, Inter, sans-serif" font-size="15" font-weight="bold">{{RIGHT_LABEL}}</text>

        <!-- VS divider -->
        <line x1="640" y1="120" x2="640" y2="628" stroke="#30363D" stroke-width="1" stroke-dasharray="6,4"/>

        <!-- Row 1 (y=120, h=162) -->
        <rect x="60" y="120" width="550" height="162" fill="#161B22" rx="6" stroke="#30363D" stroke-width="1"/>
        <image href="{{SCREENSHOT_L1}}" x="62" y="122" width="546" height="158" preserveAspectRatio="xMidYMid slice"/>
        <rect x="690" y="120" width="550" height="162" fill="#161B22" rx="6" stroke="#30363D" stroke-width="1"/>
        <image href="{{SCREENSHOT_R1}}" x="692" y="122" width="546" height="158" preserveAspectRatio="xMidYMid slice"/>

        <!-- Row 2 (y=294, h=162) -->
        <rect x="60" y="294" width="550" height="162" fill="#161B22" rx="6" stroke="#30363D" stroke-width="1"/>
        <image href="{{SCREENSHOT_L2}}" x="62" y="296" width="546" height="158" preserveAspectRatio="xMidYMid slice"/>
        <rect x="690" y="294" width="550" height="162" fill="#161B22" rx="6" stroke="#30363D" stroke-width="1"/>
        <image href="{{SCREENSHOT_R2}}" x="692" y="296" width="546" height="158" preserveAspectRatio="xMidYMid slice"/>

        <!-- Row 3 (y=468, h=162) -->
        <rect x="60" y="468" width="550" height="162" fill="#161B22" rx="6" stroke="#30363D" stroke-width="1"/>
        <image href="{{SCREENSHOT_L3}}" x="62" y="470" width="546" height="158" preserveAspectRatio="xMidYMid slice"/>
        <rect x="690" y="468" width="550" height="162" fill="#161B22" rx="6" stroke="#30363D" stroke-width="1"/>
        <image href="{{SCREENSHOT_R3}}" x="692" y="470" width="546" height="158" preserveAspectRatio="xMidYMid slice"/>

        <!-- Bottom table area (y=642, h=78) -->
        <line x1="60" y1="640" x2="1220" y2="640" stroke="#30363D" stroke-width="1"/>
        <g id="table-area" transform="translate(60, 652)">
            {{TABLE_AREA}}
        </g>
    </g>
</svg>
