<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background — deep black -->
  <rect width="1280" height="720" fill="#0C0C0C"/>

  <!-- ==================== Header ==================== -->
  <text text-anchor="start" x="60" y="42" fill="#00FF78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" letter-spacing="3" data-role="kicker">
    {{KICKER_LABEL}}
  </text>
  <text text-anchor="start" x="60" y="78" fill="#E0E0E0" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" data-role="title">
    {{PAGE_TITLE}}
  </text>

  <!-- ==================== Terminal Window ==================== -->
  <!-- Outer glow -->
  <rect x="47" y="97" width="1186" height="566" rx="12" fill="none" stroke="#00FF78" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Window border -->
  <rect x="50" y="100" width="1180" height="560" rx="10" fill="#020803" stroke="#00FF78" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Title bar -->
  <rect x="50" y="100" width="1180" height="40" rx="10" fill="#0A0A0A"/>
  <rect x="50" y="125" width="1180" height="15" fill="#0A0A0A"/>
  <!-- Traffic-light dots (muted green tint) -->
  <circle cx="76" cy="120" r="6" fill="#1A1A1A" stroke="#00FF78" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="96" cy="120" r="6" fill="#1A1A1A" stroke="#00FF78" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="116" cy="120" r="6" fill="#1A1A1A" stroke="#00FF78" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Window title -->
  <text x="640" y="126" text-anchor="middle" fill="#00FF78" fill-opacity="0.5" font-family="Consolas, Courier New, monospace" font-size="13" data-role="session-name">
    {{SESSION_NAME}}
  </text>

  <!-- ==================== Terminal Lines ==================== -->
  <!-- Line 1: command -->
  <text text-anchor="start" x="76" y="172" fill="#00FF78" font-family="Consolas, Courier New, monospace" font-size="15">
    <tspan fill="#00FF78">$ </tspan><tspan fill="#E0E0E0" data-role="cmd-line-1">{{CMD_LINE_1}}</tspan>
  </text>

  <!-- Line 2: output -->
  <text text-anchor="start" x="88" y="196" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-1">
    {{OUTPUT_LINE_1}}
  </text>

  <!-- Line 3: output -->
  <text text-anchor="start" x="88" y="218" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-2">
    {{OUTPUT_LINE_2}}
  </text>

  <!-- Line 4: output -->
  <text text-anchor="start" x="88" y="240" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-3">
    {{OUTPUT_LINE_3}}
  </text>

  <!-- Spacer -->
  <rect x="76" y="252" width="2" height="16" fill="none"/>

  <!-- Line 5: command -->
  <text text-anchor="start" x="76" y="278" fill="#00FF78" font-family="Consolas, Courier New, monospace" font-size="15">
    <tspan fill="#00FF78">$ </tspan><tspan fill="#E0E0E0" data-role="cmd-line-2">{{CMD_LINE_2}}</tspan>
  </text>

  <!-- Line 6: output -->
  <text text-anchor="start" x="88" y="302" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-4">
    {{OUTPUT_LINE_4}}
  </text>

  <!-- Line 7: output -->
  <text text-anchor="start" x="88" y="324" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-5">
    {{OUTPUT_LINE_5}}
  </text>

  <!-- Spacer -->
  <rect x="76" y="336" width="2" height="16" fill="none"/>

  <!-- Line 8: command -->
  <text text-anchor="start" x="76" y="362" fill="#00FF78" font-family="Consolas, Courier New, monospace" font-size="15">
    <tspan fill="#00FF78">$ </tspan><tspan fill="#E0E0E0" data-role="cmd-line-3">{{CMD_LINE_3}}</tspan>
  </text>

  <!-- Line 9: output -->
  <text text-anchor="start" x="88" y="386" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-6">
    {{OUTPUT_LINE_6}}
  </text>

  <!-- Line 10: output -->
  <text text-anchor="start" x="88" y="408" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-7">
    {{OUTPUT_LINE_7}}
  </text>

  <!-- Spacer -->
  <rect x="76" y="420" width="2" height="16" fill="none"/>

  <!-- Line 11: command -->
  <text text-anchor="start" x="76" y="446" fill="#00FF78" font-family="Consolas, Courier New, monospace" font-size="15">
    <tspan fill="#00FF78">$ </tspan><tspan fill="#E0E0E0" data-role="cmd-line-4">{{CMD_LINE_4}}</tspan>
  </text>

  <!-- Line 12: output -->
  <text text-anchor="start" x="88" y="470" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-8">
    {{OUTPUT_LINE_8}}
  </text>

  <!-- Line 13: output -->
  <text text-anchor="start" x="88" y="492" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-9">
    {{OUTPUT_LINE_9}}
  </text>

  <!-- Line 14: output -->
  <text text-anchor="start" x="88" y="514" fill="#8A8A8A" font-family="Consolas, Courier New, monospace" font-size="14" data-role="output-line-10">
    {{OUTPUT_LINE_10}}
  </text>

  <!-- Spacer -->
  <rect x="76" y="526" width="2" height="16" fill="none"/>

  <!-- Cursor line (blinking caret represented as solid rect) -->
  <text text-anchor="start" x="76" y="556" fill="#00FF78" font-family="Consolas, Courier New, monospace" font-size="15">
    <tspan fill="#00FF78">$ </tspan>
  </text>
  <rect x="92" y="543" width="9" height="17" fill="#00FF78" fill-opacity="0.8"/>

  <!-- ==================== Footer ==================== -->
  <text x="640" y="695" text-anchor="middle" fill="#3A3A3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" data-role="page-num">
    {{PAGE_NUM}}
  </text>
</svg>
