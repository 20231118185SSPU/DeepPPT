<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background — dark IDE theme -->
  <rect width="1280" height="720" fill="#1E1E2E"/>

  <!-- ==================== Header ==================== -->
  <text text-anchor="start" x="60" y="42" fill="#F7768E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" letter-spacing="3" data-role="kicker">
    {{KICKER_LABEL}}
  </text>
  <text text-anchor="start" x="60" y="78" fill="#CDD6F4" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" data-role="title">
    {{PAGE_TITLE}}
  </text>

  <!-- ==================== Code Window ==================== -->
  <!-- Window border -->
  <rect x="50" y="100" width="1180" height="560" rx="10" fill="#181825" stroke="#313244" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="50" y="100" width="1180" height="40" rx="10" fill="#11111B"/>
  <rect x="50" y="125" width="1180" height="15" fill="#11111B"/>
  <!-- Traffic-light dots -->
  <circle cx="76" cy="120" r="6" fill="#F38BA8"/>
  <circle cx="96" cy="120" r="6" fill="#F9E2AF"/>
  <circle cx="116" cy="120" r="6" fill="#A6E3A1"/>
  <!-- Window title -->
  <text x="640" y="126" text-anchor="middle" fill="#6C7086" font-family="Consolas, Courier New, monospace" font-size="13" data-role="file-name">
    {{FILE_NAME}}
  </text>

  <!-- ==================== Line Numbers + Code Content ==================== -->
  <!-- Left gutter background -->
  <rect x="50" y="140" width="60" height="520" fill="#11111B" fill-opacity="0.5"/>

  <!-- Row 1 -->
  <text x="76" y="172" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">1</text>
  <text text-anchor="start" x="126" y="172" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-1">
    {{CODE_LINE_1}}
  </text>

  <!-- Row 2 -->
  <text x="76" y="196" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">2</text>
  <text text-anchor="start" x="126" y="196" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-2">
    {{CODE_LINE_2}}
  </text>

  <!-- Row 3 -->
  <text x="76" y="220" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">3</text>
  <text text-anchor="start" x="126" y="220" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-3">
    {{CODE_LINE_3}}
  </text>

  <!-- Row 4 -->
  <text x="76" y="244" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">4</text>
  <text text-anchor="start" x="126" y="244" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-4">
    {{CODE_LINE_4}}
  </text>

  <!-- Row 5 -->
  <text x="76" y="268" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">5</text>
  <text text-anchor="start" x="126" y="268" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-5">
    {{CODE_LINE_5}}
  </text>

  <!-- Row 6 -->
  <text x="76" y="292" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">6</text>
  <text text-anchor="start" x="126" y="292" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-6">
    {{CODE_LINE_6}}
  </text>

  <!-- Row 7 -->
  <text x="76" y="316" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">7</text>
  <text text-anchor="start" x="126" y="316" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-7">
    {{CODE_LINE_7}}
  </text>

  <!-- Row 8 -->
  <text x="76" y="340" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">8</text>
  <text text-anchor="start" x="126" y="340" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-8">
    {{CODE_LINE_8}}
  </text>

  <!-- Row 9 -->
  <text x="76" y="364" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">9</text>
  <text text-anchor="start" x="126" y="364" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-9">
    {{CODE_LINE_9}}
  </text>

  <!-- Row 10 -->
  <text x="76" y="388" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">10</text>
  <text text-anchor="start" x="126" y="388" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-10">
    {{CODE_LINE_10}}
  </text>

  <!-- Row 11 -->
  <text x="76" y="412" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">11</text>
  <text text-anchor="start" x="126" y="412" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-11">
    {{CODE_LINE_11}}
  </text>

  <!-- Row 12 -->
  <text x="76" y="436" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">12</text>
  <text text-anchor="start" x="126" y="436" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-12">
    {{CODE_LINE_12}}
  </text>

  <!-- Row 13 -->
  <text x="76" y="460" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">13</text>
  <text text-anchor="start" x="126" y="460" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-13">
    {{CODE_LINE_13}}
  </text>

  <!-- Row 14 -->
  <text x="76" y="484" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">14</text>
  <text text-anchor="start" x="126" y="484" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-14">
    {{CODE_LINE_14}}
  </text>

  <!-- Row 15 -->
  <text x="76" y="508" text-anchor="end" fill="#585B70" font-family="Consolas, Courier New, monospace" font-size="14">15</text>
  <text text-anchor="start" x="126" y="508" fill="#CDD6F4" font-family="Consolas, Courier New, monospace" font-size="14" data-role="code-line-15">
    {{CODE_LINE_15}}
  </text>

  <!-- ==================== Footer ==================== -->
  <text x="640" y="695" text-anchor="middle" fill="#6C7086" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" data-role="page-num">
    {{PAGE_NUM}}
  </text>
</svg>
