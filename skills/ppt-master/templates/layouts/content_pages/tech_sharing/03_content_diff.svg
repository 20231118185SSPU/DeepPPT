  </text>
  <!-- Row 10 -->
  <rect x="641" y="370" width="588" height="22" fill="#F0FDF4"/>
  <text text-anchor="start" x="656" y="385" fill="#22C55E" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-10">
    {{NEW_LINE_10}}
  </text>

  <!-- ==================== Diff Summary Bar ==================== -->
  <rect x="51" y="410" width="1178" height="35" fill="#F0F2F5"/>
  <text x="640" y="433" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" data-role="diff-summary">
    {{DIFF_SUMMARY}}
  </text>

  <!-- ==================== Footer ==================== -->
  <line x1="40" y1="665" x2="1240" y2="665" stroke="#E0E6ED" stroke-width="1"/>
  <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" data-role="page-num">
    {{PAGE_NUM}}
  </text>
</svg>
