  <rect x="641" y="282" width="588" height="22" fill="#F9FAFB"/>
  <text text-anchor="start" x="656" y="297" fill="#6B7280" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-6">
    {{NEW_LINE_6}}
  </text>
  <!-- Row 7 -->
  <rect x="641" y="304" width="588" height="22" fill="#F9FAFB"/>
  <text text-anchor="start" x="656" y="319" fill="#6B7280" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-7">
    {{NEW_LINE_7}}
  </text>
  <!-- Row 8 -->
  <rect x="641" y="326" width="588" height="22" fill="#F9FAFB"/>
  <text text-anchor="start" x="656" y="341" fill="#6B7280" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-8">
    {{NEW_LINE_8}}
  </text>
  <!-- Row 9 -->
  <rect x="641" y="348" width="588" height="22" fill="#F0FDF4"/>
  <text text-anchor="start" x="656" y="363" fill="#22C55E" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-9">
