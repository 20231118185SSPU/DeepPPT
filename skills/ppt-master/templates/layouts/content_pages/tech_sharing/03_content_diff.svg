  <text text-anchor="start" x="656" y="187" fill="#22C55E" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-1">
    {{NEW_LINE_1}}
  </text>
  <!-- Row 2 -->
  <rect x="641" y="194" width="588" height="22" fill="#F0FDF4"/>
