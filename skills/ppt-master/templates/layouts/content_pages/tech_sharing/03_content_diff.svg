  </text>
  <!-- Row 6 -->
  <rect x="51" y="282" width="589" height="22" fill="#F9FAFB"/>
  <text text-anchor="start" x="66" y="297" fill="#6B7280" font-family="Consolas, Courier New, monospace" font-size="13" data-role="old-line-6">
