  </text>
  <!-- Row 8 -->
  <rect x="51" y="326" width="589" height="22" fill="#F9FAFB"/>
  <text text-anchor="start" x="66" y="341" fill="#6B7280" font-family="Consolas, Courier New, monospace" font-size="13" data-role="old-line-8">
