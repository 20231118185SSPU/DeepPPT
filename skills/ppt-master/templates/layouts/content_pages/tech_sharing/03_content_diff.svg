  <rect x="641" y="216" width="588" height="22" fill="#F0FDF4"/>
  <text text-anchor="start" x="656" y="231" fill="#22C55E" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-3">
    {{NEW_LINE_3}}
  </text>
  <!-- Row 4 -->
  <rect x="641" y="238" width="588" height="22" fill="#F0FDF4"/>
  <text text-anchor="start" x="656" y="253" fill="#22C55E" font-family="Consolas, Courier New, monospace" font-size="13" data-role="new-line-4">
