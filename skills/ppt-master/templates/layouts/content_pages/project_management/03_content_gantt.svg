<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#F7F9FC"/>

  <!-- ==================== Header ==================== -->
  <text x="640" y="48" text-anchor="middle" fill="#1A5276" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" letter-spacing="1">
    GANTT CHART
  </text>
  <text x="640" y="85" text-anchor="middle" fill="#1A5276" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" data-role="title">
    {{PAGE_TITLE}}
  </text>

  <!-- ==================== Gantt Container ==================== -->
  <rect x="40" y="110" width="1200" height="555" rx="10" fill="#FFFFFF" stroke="#E0E6ED" stroke-width="1"/>

  <!-- ==================== Timeline Header Row ==================== -->
  <!-- Task label column header -->
  <text text-anchor="start" x="60" y="143" fill="#1A5276" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">
    Task
  </text>
  <!-- Column headers (W1-W12) -->
  <text x="275" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W1
  </text>
  <text x="355" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W2
  </text>
  <text x="435" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W3
  </text>
  <text x="515" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W4
  </text>
  <text x="595" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W5
  </text>
  <text x="675" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W6
  </text>
  <text x="755" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W7
  </text>
  <text x="835" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W8
  </text>
  <text x="915" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W9
  </text>
  <text x="995" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W10
  </text>
  <text x="1075" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W11
  </text>
  <text x="1155" y="143" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">
    W12
  </text>

  <!-- Header separator -->
  <line x1="220" y1="155" x2="1220" y2="155" stroke="#E0E6ED" stroke-width="1"/>

  <!-- ==================== Vertical Grid Lines ==================== -->
  <line x1="275" y1="155" x2="275" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="355" y1="155" x2="355" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="435" y1="155" x2="435" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="515" y1="155" x2="515" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="595" y1="155" x2="595" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="675" y1="155" x2="675" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="755" y1="155" x2="755" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="835" y1="155" x2="835" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="915" y1="155" x2="915" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="995" y1="155" x2="995" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="1075" y1="155" x2="1075" y2="650" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="1155" y1="155" x2="1155" y2="650" stroke="#F0F0F0" stroke-width="1"/>

  <!-- Label column separator -->
  <line x1="220" y1="110" x2="220" y2="665" stroke="#E0E6ED" stroke-width="1"/>

  <!-- ==================== Row 1: Task 1 ==================== -->
  <text text-anchor="start" x="60" y="200" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="500" data-role="task-1-name">
    {{TASK_1_NAME}}
  </text>
  <rect x="235" y="182" width="240" height="28" rx="6" fill="#2E86C1"/>
  <text x="355" y="201" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="600" data-role="task-1-label">
    {{TASK_1_LABEL}}
  </text>
  <line x1="50" y1="220" x2="1220" y2="220" stroke="#F0F0F0" stroke-width="1"/>

  <!-- ==================== Row 2: Task 2 ==================== -->
  <text text-anchor="start" x="60" y="270" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="500" data-role="task-2-name">
    {{TASK_2_NAME}}
  </text>
  <rect x="315" y="252" width="320" height="28" rx="6" fill="#E67E22"/>
  <text x="475" y="271" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="600" data-role="task-2-label">
    {{TASK_2_LABEL}}
  </text>
  <line x1="50" y1="290" x2="1220" y2="290" stroke="#F0F0F0" stroke-width="1"/>

  <!-- ==================== Row 3: Task 3 ==================== -->
  <text text-anchor="start" x="60" y="340" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="500" data-role="task-3-name">
    {{TASK_3_NAME}}
  </text>
  <rect x="555" y="322" width="240" height="28" rx="6" fill="#8E44AD"/>
  <text x="675" y="341" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="600" data-role="task-3-label">
    {{TASK_3_LABEL}}
  </text>
  <line x1="50" y1="360" x2="1220" y2="360" stroke="#F0F0F0" stroke-width="1"/>

  <!-- ==================== Row 4: Task 4 ==================== -->
  <text text-anchor="start" x="60" y="410" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="500" data-role="task-4-name">
    {{TASK_4_NAME}}
  </text>
  <rect x="635" y="392" width="240" height="28" rx="6" fill="#27AE60"/>
  <text x="755" y="411" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="600" data-role="task-4-label">
    {{TASK_4_LABEL}}
  </text>
  <line x1="50" y1="430" x2="1220" y2="430" stroke="#F0F0F0" stroke-width="1"/>

  <!-- ==================== Row 5: Task 5 ==================== -->
  <text text-anchor="start" x="60" y="480" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="500" data-role="task-5-name">
    {{TASK_5_NAME}}
  </text>
  <rect x="875" y="462" width="240" height="28" rx="6" fill="#C0392B"/>
  <text x="995" y="481" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="600" data-role="task-5-label">
    {{TASK_5_LABEL}}
  </text>
  <line x1="50" y1="500" x2="1220" y2="500" stroke="#F0F0F0" stroke-width="1"/>

  <!-- ==================== Row 6: Task 6 (optional) ==================== -->
  <text text-anchor="start" x="60" y="550" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="500" data-role="task-6-name">
    {{TASK_6_NAME}}
  </text>
  <rect x="395" y="532" width="160" height="28" rx="6" fill="#16A085"/>
  <text x="475" y="551" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="600" data-role="task-6-label">
    {{TASK_6_LABEL}}
  </text>
  <line x1="50" y1="570" x2="1220" y2="570" stroke="#F0F0F0" stroke-width="1"/>

  <!-- ==================== Milestone Diamond Marker ==================== -->
  <!-- Milestone at W6 boundary -->
  <polygon points="595,585 605,595 595,605 585,595" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
  <text x="595" y="625" text-anchor="middle" fill="#E74C3C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold" data-role="milestone-1-label">
    {{MILESTONE_1_LABEL}}
  </text>

  <!-- Milestone at W10 boundary -->
  <polygon points="995,585 1005,595 995,605 985,595" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
  <text x="995" y="625" text-anchor="middle" fill="#E74C3C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold" data-role="milestone-2-label">
    {{MILESTONE_2_LABEL}}
  </text>

  <!-- ==================== Footer ==================== -->
  <line x1="40" y1="680" x2="1240" y2="680" stroke="#E0E6ED" stroke-width="1"/>
  <text x="640" y="708" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" data-role="page-num">
    {{PAGE_NUM}}
  </text>
</svg>
