<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0050B3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Header gradient bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#headerGrad)"/>

  <!-- Header area -->
  <rect x="60" y="26" width="42" height="42" rx="8" fill="url(#badgeGrad)"/>
  <text x="81" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">03</text>
  <text text-anchor="start" x="118" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">{{PAGE_TITLE}}</text>
  <text x="1220" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="end">{{ORG_NAME}}</text>
  <line x1="60" y1="82" x2="1220" y2="82" stroke="#E5E7EB" stroke-width="1"/>

  <!-- LEFT: Large quote area -->
  <!-- Big decorative quotation mark -->
  <text text-anchor="start" x="60" y="190" font-family="Georgia, serif" font-size="120" fill="#00B4D8" opacity="0.25">"</text>

  <!-- Quote text -->
  <text text-anchor="start" x="90" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="500" fill="#1A1A2E" line-height="1.6">{{QUOTE_LINE_1}}</text>
  <text text-anchor="start" x="90" y="248" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="500" fill="#1A1A2E">{{QUOTE_LINE_2}}</text>
  <text text-anchor="start" x="90" y="286" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="500" fill="#1A1A2E">{{QUOTE_LINE_3}}</text>
  <text text-anchor="start" x="90" y="324" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="500" fill="#1A1A2E">{{QUOTE_LINE_4}}</text>

  <!-- Quote accent line -->
  <rect x="90" y="346" width="80" height="3" rx="1.5" fill="url(#badgeGrad)"/>

  <!-- Attribution -->
  <text text-anchor="start" x="90" y="386" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#0050B3">{{QUOTE_AUTHOR}}</text>
  <text text-anchor="start" x="90" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">{{QUOTE_AUTHOR_TITLE}}</text>

  <!-- Source context below quote -->
  <rect x="60" y="440" width="700" height="100" rx="10" fill="#F0F9FF" stroke="#E0F2FE" stroke-width="1"/>
  <text text-anchor="start" x="84" y="472" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="600" fill="#0050B3">{{CONTEXT_TITLE}}</text>
  <text text-anchor="start" x="84" y="496" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#374151">{{CONTEXT_LINE_1}}</text>
  <text text-anchor="start" x="84" y="516" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#374151">{{CONTEXT_LINE_2}}</text>

  <!-- RIGHT: 3 stacked stat cards -->
  <!-- Divider line -->
  <line x1="790" y1="110" x2="790" y2="570" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Stat card 1 -->
  <rect x="820" y="110" width="400" height="130" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="820" y="110" width="6" height="130" rx="3" fill="#00B4D8"/>
  <text text-anchor="start" x="850" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="800" fill="#0050B3">{{STAT_NUM_1}}</text>
  <text text-anchor="start" x="850" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">{{STAT_LABEL_1}}</text>
  <!-- Delta badge -->
  <rect x="1120" y="135" width="70" height="28" rx="14" fill="#ECFDF5"/>
  <text x="1155" y="154" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="600" fill="#059669" text-anchor="middle">{{STAT_DELTA_1}}</text>

  <!-- Stat card 2 -->
  <rect x="820" y="260" width="400" height="130" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="820" y="260" width="6" height="130" rx="3" fill="#0050B3"/>
  <text text-anchor="start" x="850" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="800" fill="#0050B3">{{STAT_NUM_2}}</text>
  <text text-anchor="start" x="850" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">{{STAT_LABEL_2}}</text>
  <rect x="1120" y="285" width="70" height="28" rx="14" fill="#EFF6FF"/>
  <text x="1155" y="304" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="600" fill="#0050B3" text-anchor="middle">{{STAT_DELTA_2}}</text>

  <!-- Stat card 3 -->
  <rect x="820" y="410" width="400" height="130" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="820" y="410" width="6" height="130" rx="3" fill="#0077B6"/>
  <text text-anchor="start" x="850" y="470" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="800" fill="#0077B6">{{STAT_NUM_3}}</text>
  <text text-anchor="start" x="850" y="500" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">{{STAT_LABEL_3}}</text>
  <rect x="1120" y="435" width="70" height="28" rx="14" fill="#FFF7ED"/>
  <text x="1155" y="454" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="600" fill="#EA580C" text-anchor="middle">{{STAT_DELTA_3}}</text>

  <!-- Footer -->
  <line x1="60" y1="680" x2="1220" y2="680" stroke="#E5E7EB" stroke-width="1"/>
  <text text-anchor="start" x="60" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF">{{SOURCE_TEXT}}</text>
  <text x="640" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">{{SECTION_NAME}}</text>
  <text x="1220" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="end">3 / {{TOTAL_PAGES}}</text>
</svg>
