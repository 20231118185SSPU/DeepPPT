<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0050B3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Header gradient bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#headerGrad)"/>

  <!-- Header area -->
  <rect x="60" y="26" width="42" height="42" rx="8" fill="url(#badgeGrad)"/>
  <text x="81" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">03</text>
  <text text-anchor="start" x="118" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">{{PAGE_TITLE}}</text>
  <text x="1220" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="end">{{ORG_NAME}}</text>
  <line x1="60" y1="82" x2="1220" y2="82" stroke="#E5E7EB" stroke-width="1"/>

  <!-- LEFT SIDEBAR -->
  <!-- Image placeholder -->
  <rect x="60" y="100" width="350" height="260" rx="12" fill="#E0F2FE" stroke="#B0D9F0" stroke-width="1" data-role="image-slot" data-caption="sidebar image"/>
  <text x="235" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">{{IMAGE_CAPTION}}</text>
  <text x="235" y="250" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">[Image Placeholder]</text>

  <!-- Stat card 1 -->
  <rect x="60" y="376" width="165" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text text-anchor="start" x="78" y="404" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#0050B3">{{STAT_VALUE_1}}</text>
  <text text-anchor="start" x="78" y="430" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">{{STAT_LABEL_1}}</text>
  <rect x="78" y="440" width="40" height="3" rx="1.5" fill="#00B4D8"/>

  <!-- Stat card 2 -->
  <rect x="245" y="376" width="165" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text text-anchor="start" x="263" y="404" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#0050B3">{{STAT_VALUE_2}}</text>
  <text text-anchor="start" x="263" y="430" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">{{STAT_LABEL_2}}</text>
  <rect x="263" y="440" width="40" height="3" rx="1.5" fill="#0050B3"/>

  <!-- Stat card 3 -->
  <rect x="60" y="470" width="350" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text text-anchor="start" x="78" y="498" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#0077B6">{{STAT_VALUE_3}}</text>
  <text text-anchor="start" x="78" y="524" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">{{STAT_LABEL_3}}</text>
  <rect x="78" y="534" width="40" height="3" rx="1.5" fill="#0077B6"/>

  <!-- RIGHT MAIN AREA -->
  <!-- Section title -->
  <text text-anchor="start" x="440" y="130" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1A2E">{{SECTION_TITLE}}</text>
  <rect x="440" y="140" width="60" height="3" rx="1.5" fill="url(#badgeGrad)"/>

  <!-- Bullet points -->
  <circle cx="456" cy="182" r="5" fill="#00B4D8"/>
  <text text-anchor="start" x="472" y="187" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#374151">{{BULLET_1}}</text>

  <circle cx="456" cy="226" r="5" fill="#0050B3"/>
  <text text-anchor="start" x="472" y="231" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#374151">{{BULLET_2}}</text>

  <circle cx="456" cy="270" r="5" fill="#0077B6"/>
  <text text-anchor="start" x="472" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#374151">{{BULLET_3}}</text>

  <circle cx="456" cy="314" r="5" fill="#00B4D8"/>
  <text text-anchor="start" x="472" y="319" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#374151">{{BULLET_4}}</text>

  <circle cx="456" cy="358" r="5" fill="#0050B3"/>
  <text text-anchor="start" x="472" y="363" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#374151">{{BULLET_5}}</text>

  <!-- Callout box -->
  <rect x="440" y="420" width="780" height="120" rx="10" fill="#F0F9FF" stroke="#00B4D8" stroke-width="1"/>
  <rect x="440" y="420" width="5" height="120" rx="2.5" fill="#00B4D8"/>
  <text text-anchor="start" x="468" y="455" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#0050B3">{{CALLOUT_TITLE}}</text>
  <text text-anchor="start" x="468" y="480" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#374151">{{CALLOUT_TEXT_1}}</text>
  <text text-anchor="start" x="468" y="500" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#374151">{{CALLOUT_TEXT_2}}</text>

  <!-- Additional detail area -->
  <rect x="440" y="560" width="780" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text text-anchor="start" x="468" y="594" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#1A1A2E">{{EXTRA_TITLE}}</text>
  <text text-anchor="start" x="468" y="618" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">{{EXTRA_TEXT}}</text>

  <!-- Footer -->
  <line x1="60" y1="680" x2="1220" y2="680" stroke="#E5E7EB" stroke-width="1"/>
  <text text-anchor="start" x="60" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF">{{SOURCE_TEXT}}</text>
  <text x="640" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">{{SECTION_NAME}}</text>
  <text x="1220" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="end">3 / {{TOTAL_PAGES}}</text>
</svg>
