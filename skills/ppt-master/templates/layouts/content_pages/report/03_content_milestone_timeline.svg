<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0050B3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Header gradient bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#headerGrad)"/>

  <!-- Header area -->
  <rect x="60" y="26" width="42" height="42" rx="8" fill="url(#badgeGrad)"/>
  <text x="81" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">03</text>
  <text text-anchor="start" x="118" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">{{PAGE_TITLE}}</text>
  <text x="1220" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="end">{{ORG_NAME}}</text>

  <!-- Header separator -->
  <line x1="60" y1="82" x2="1220" y2="82" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Timeline horizontal line -->
  <line x1="140" y1="340" x2="1140" y2="340" stroke="#00B4D8" stroke-width="3" stroke-linecap="round"/>

  <!-- Milestone node 1 -->
  <circle cx="140" cy="340" r="18" fill="#00B4D8"/>
  <circle cx="140" cy="340" r="8" fill="#FFFFFF"/>
  <text x="140" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle" text-transform="uppercase" letter-spacing="1">2022 Q1</text>
  <text x="140" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{MILESTONE_TITLE_1}}</text>
  <text x="140" y="262" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{MILESTONE_DESC_1}}</text>
  <!-- Card below node 1 -->
  <rect x="70" y="378" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="140" y="406" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="600" fill="#0050B3" text-anchor="middle">{{DETAIL_TITLE_1}}</text>
  <text x="140" y="426" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_DESC_1}}</text>
  <text x="140" y="444" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_EXTRA_1}}</text>

  <!-- Milestone node 2 -->
  <circle cx="390" cy="340" r="18" fill="#0050B3"/>
  <circle cx="390" cy="340" r="8" fill="#FFFFFF"/>
  <text x="390" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">2022 Q3</text>
  <text x="390" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{MILESTONE_TITLE_2}}</text>
  <text x="390" y="262" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{MILESTONE_DESC_2}}</text>
  <rect x="320" y="378" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="390" y="406" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="600" fill="#0050B3" text-anchor="middle">{{DETAIL_TITLE_2}}</text>
  <text x="390" y="426" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_DESC_2}}</text>
  <text x="390" y="444" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_EXTRA_2}}</text>

  <!-- Milestone node 3 -->
  <circle cx="640" cy="340" r="18" fill="#00B4D8"/>
  <circle cx="640" cy="340" r="8" fill="#FFFFFF"/>
  <text x="640" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">2023 Q1</text>
  <text x="640" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{MILESTONE_TITLE_3}}</text>
  <text x="640" y="262" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{MILESTONE_DESC_3}}</text>
  <rect x="570" y="378" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="640" y="406" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="600" fill="#0050B3" text-anchor="middle">{{DETAIL_TITLE_3}}</text>
  <text x="640" y="426" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_DESC_3}}</text>
  <text x="640" y="444" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_EXTRA_3}}</text>

  <!-- Milestone node 4 -->
  <circle cx="890" cy="340" r="18" fill="#0050B3"/>
  <circle cx="890" cy="340" r="8" fill="#FFFFFF"/>
  <text x="890" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">2023 Q3</text>
  <text x="890" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{MILESTONE_TITLE_4}}</text>
  <text x="890" y="262" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{MILESTONE_DESC_4}}</text>
  <rect x="820" y="378" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="890" y="406" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="600" fill="#0050B3" text-anchor="middle">{{DETAIL_TITLE_4}}</text>
  <text x="890" y="426" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_DESC_4}}</text>
  <text x="890" y="444" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_EXTRA_4}}</text>

  <!-- Milestone node 5 -->
  <circle cx="1140" cy="340" r="18" fill="#00B4D8"/>
  <circle cx="1140" cy="340" r="8" fill="#FFFFFF"/>
  <text x="1140" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">2024 Q1</text>
  <text x="1140" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{MILESTONE_TITLE_5}}</text>
  <text x="1140" y="262" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{MILESTONE_DESC_5}}</text>
  <rect x="1070" y="378" width="140" height="80" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="1140" y="406" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="600" fill="#0050B3" text-anchor="middle">{{DETAIL_TITLE_5}}</text>
  <text x="1140" y="426" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_DESC_5}}</text>
  <text x="1140" y="444" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">{{DETAIL_EXTRA_5}}</text>

  <!-- Bottom summary bar -->
  <rect x="60" y="490" width="1160" height="56" rx="8" fill="#F0F9FF" stroke="#00B4D8" stroke-width="1"/>
  <text text-anchor="start" x="80" y="524" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#0050B3">{{SUMMARY_LABEL}}</text>
  <text text-anchor="start" x="280" y="524" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#374151">{{SUMMARY_TEXT}}</text>

  <!-- Footer -->
  <line x1="60" y1="680" x2="1220" y2="680" stroke="#E5E7EB" stroke-width="1"/>
  <text text-anchor="start" x="60" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF">{{SOURCE_TEXT}}</text>
  <text x="640" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">{{SECTION_NAME}}</text>
  <text x="1220" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="end">3 / {{TOTAL_PAGES}}</text>
</svg>
