<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0050B3"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0050B3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Header gradient bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#headerGrad)"/>

  <!-- Header area -->
  <rect x="60" y="26" width="42" height="42" rx="8" fill="url(#badgeGrad)"/>
  <text x="81" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">03</text>
  <text text-anchor="start" x="118" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">{{PAGE_TITLE}}</text>
  <text x="1220" y="54" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="end">{{ORG_NAME}}</text>
  <line x1="60" y1="82" x2="1220" y2="82" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Row 1: 3 cards -->
  <!-- Card 1 -->
  <rect x="60" y="102" width="366" height="240" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="243" cy="170" r="36" fill="#E0F2FE" stroke="#00B4D8" stroke-width="2"/>
  <!-- Icon: chart bar icon -->
  <rect x="231" y="156" width="8" height="22" rx="2" fill="#00B4D8"/>
  <rect x="243" y="148" width="8" height="30" rx="2" fill="#0050B3"/>
  <rect x="255" y="152" width="8" height="26" rx="2" fill="#0077B6"/>
  <text x="243" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{CARD_TITLE_1}}</text>
  <text x="243" y="254" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_1A}}</text>
  <text x="243" y="274" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_1B}}</text>

  <!-- Card 2 -->
  <rect x="457" y="102" width="366" height="240" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="640" cy="170" r="36" fill="#E0F2FE" stroke="#0050B3" stroke-width="2"/>
  <!-- Icon: target icon -->
  <circle cx="640" cy="170" r="16" fill="none" stroke="#0050B3" stroke-width="2.5"/>
  <circle cx="640" cy="170" r="8" fill="none" stroke="#0050B3" stroke-width="2"/>
  <circle cx="640" cy="170" r="3" fill="#0050B3"/>
  <text x="640" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{CARD_TITLE_2}}</text>
  <text x="640" y="254" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_2A}}</text>
  <text x="640" y="274" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_2B}}</text>

  <!-- Card 3 -->
  <rect x="854" y="102" width="366" height="240" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="1037" cy="170" r="36" fill="#E0F2FE" stroke="#0077B6" stroke-width="2"/>
  <!-- Icon: shield/checkbox icon -->
  <path d="M1027 168 L1035 176 L1050 161" fill="none" stroke="#0077B6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1037" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{CARD_TITLE_3}}</text>
  <text x="1037" y="254" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_3A}}</text>
  <text x="1037" y="274" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_3B}}</text>

  <!-- Row 2: 3 cards -->
  <!-- Card 4 -->
  <rect x="60" y="366" width="366" height="240" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="243" cy="434" r="36" fill="#E0F2FE" stroke="#00B4D8" stroke-width="2"/>
  <!-- Icon: people/team icon -->
  <circle cx="243" cy="426" r="8" fill="#00B4D8"/>
  <path d="M229 448 Q243 438 257 448" fill="#00B4D8"/>
  <text x="243" y="494" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{CARD_TITLE_4}}</text>
  <text x="243" y="518" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_4A}}</text>
  <text x="243" y="538" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_4B}}</text>

  <!-- Card 5 -->
  <rect x="457" y="366" width="366" height="240" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="640" cy="434" r="36" fill="#E0F2FE" stroke="#0050B3" stroke-width="2"/>
  <!-- Icon: gear/settings icon -->
  <circle cx="640" cy="434" r="10" fill="none" stroke="#0050B3" stroke-width="2.5"/>
  <circle cx="640" cy="434" r="4" fill="#0050B3"/>
  <line x1="640" y1="420" x2="640" y2="424" stroke="#0050B3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="640" y1="444" x2="640" y2="448" stroke="#0050B3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="626" y1="434" x2="630" y2="434" stroke="#0050B3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="650" y1="434" x2="654" y2="434" stroke="#0050B3" stroke-width="2.5" stroke-linecap="round"/>
  <text x="640" y="494" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{CARD_TITLE_5}}</text>
  <text x="640" y="518" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_5A}}</text>
  <text x="640" y="538" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_5B}}</text>

  <!-- Card 6 -->
  <rect x="854" y="366" width="366" height="240" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="1037" cy="434" r="36" fill="#E0F2FE" stroke="#0077B6" stroke-width="2"/>
  <!-- Icon: rocket/growth arrow -->
  <path d="M1037 422 L1045 438 L1037 434 L1029 438 Z" fill="#0077B6"/>
  <line x1="1037" y1="440" x2="1037" y2="448" stroke="#0077B6" stroke-width="2" stroke-linecap="round"/>
  <text x="1037" y="494" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E" text-anchor="middle">{{CARD_TITLE_6}}</text>
  <text x="1037" y="518" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_6A}}</text>
  <text x="1037" y="538" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">{{CARD_DESC_6B}}</text>

  <!-- Footer -->
  <line x1="60" y1="680" x2="1220" y2="680" stroke="#E5E7EB" stroke-width="1"/>
  <text text-anchor="start" x="60" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF">{{SOURCE_TEXT}}</text>
  <text x="640" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">{{SECTION_NAME}}</text>
  <text x="1220" y="702" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="end">3 / {{TOTAL_PAGES}}</text>
</svg>
