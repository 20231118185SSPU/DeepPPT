<?xml version="1.0" encoding="UTF-8"?>
<!-- deepdive_card.svg — 讲解页卡片式布局（增强版）
     用途：展开数据、补充细节、场景说明
     占位标记：TITLE, CARD_ICON_N, CARD_TITLE_N, CARD_TAG_N, CARD_BODY_N (N=1..2), DEEPDIVE_IMAGE
     改进：居中标题、卡片内修饰元素、色彩对比、文字铺满
-->
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <g id="deepdive-card">
        <!-- Background -->
        <rect width="1280" height="720" fill="#0A0E1A"/>

        <!-- Title area (centered) -->
        <line x1="540" y1="35" x2="740" y2="35" stroke="#00D4FF" stroke-width="2" stroke-opacity="0.5"/>
        <text x="640" y="72" text-anchor="middle" fill="#E8EDF5" font-family="Microsoft YaHei, Inter, sans-serif"
            font-size="32" font-weight="bold">{{TITLE}}</text>
        <text x="640" y="98" text-anchor="middle" fill="#7B8794" font-family="Consolas, Courier New, monospace"
            font-size="13">DEEP DIVE · 深入展开</text>

        <!-- Side image area (left, 370×500) -->
        <g id="deepdive-image-area" transform="translate(60, 118)">
            <rect width="370" height="520" fill="#121828" rx="8" stroke="#1E293B" stroke-width="1"/>
            <image href="{{DEEPDIVE_IMAGE}}" x="3" y="3" width="364" height="514"
                preserveAspectRatio="xMidYMid slice"/>
            <!-- Image caption bar -->
            <rect x="0" y="460" width="370" height="60" fill="#0A0E1A" fill-opacity="0.8" rx="0 0 8 8"/>
            <text x="185" y="490" text-anchor="middle" fill="#7B8794" font-family="Microsoft YaHei, Inter, sans-serif"
                font-size="11">{{CARD_ICON_1}} 配图说明</text>
        </g>

        <!-- Card column 1 -->
        <g id="card-1" transform="translate(460, 118)">
            <rect width="370" height="520" fill="#121828" rx="8" stroke="#1E293B" stroke-width="1"/>
            <!-- Accent top bar -->
            <rect width="370" height="5" fill="#00D4FF" rx="2.5"/>
            <!-- Icon + tag row -->
            <circle cx="35" cy="42" r="16" fill="#00D4FF" fill-opacity="0.15"/>
            <text x="35" y="47" text-anchor="middle" fill="#00D4FF" font-size="18">{{CARD_ICON_1}}</text>
            <text x="60" y="47" fill="#00D4FF" font-family="Consolas, Courier New, monospace"
                font-size="11" fill-opacity="0.7">{{CARD_TAG_1}}</text>
            <!-- Card title -->
            <text x="25" y="82" fill="#E8EDF5" font-family="Microsoft YaHei, Inter, sans-serif"
                font-size="20" font-weight="bold">{{CARD_TITLE_1}}</text>
            <!-- Divider -->
            <line x1="25" y1="95" x2="345" y2="95" stroke="#1E293B" stroke-width="1"/>
            <!-- Card body (fills card width) -->
            <text x="25" y="120" fill="#E8EDF5" font-family="Microsoft YaHei, Inter, sans-serif"
                font-size="15" fill-opacity="0.85">{{CARD_BODY_1}}</text>
            <!-- Bottom decoration -->
            <rect x="25" y="490" width="40" height="3" fill="#00D4FF" fill-opacity="0.3" rx="1.5"/>
        </g>

        <!-- Card column 2 -->
        <g id="card-2" transform="translate(855, 118)">
            <rect width="365" height="520" fill="#121828" rx="8" stroke="#1E293B" stroke-width="1"/>
            <!-- Accent top bar (different color) -->
            <rect width="365" height="5" fill="#FF6B6B" rx="2.5"/>
            <!-- Icon + tag row -->
            <circle cx="35" cy="42" r="16" fill="#FF6B6B" fill-opacity="0.15"/>
            <text x="35" y="47" text-anchor="middle" fill="#FF6B6B" font-size="18">{{CARD_ICON_2}}</text>
            <text x="60" y="47" fill="#FF6B6B" font-family="Consolas, Courier New, monospace"
                font-size="11" fill-opacity="0.7">{{CARD_TAG_2}}</text>
            <!-- Card title -->
            <text x="25" y="82" fill="#E8EDF5" font-family="Microsoft YaHei, Inter, sans-serif"
                font-size="20" font-weight="bold">{{CARD_TITLE_2}}</text>
            <!-- Divider -->
            <line x1="25" y1="95" x2="340" y2="95" stroke="#1E293B" stroke-width="1"/>
            <!-- Card body -->
            <text x="25" y="120" fill="#E8EDF5" font-family="Microsoft YaHei, Inter, sans-serif"
                font-size="15" fill-opacity="0.85">{{CARD_BODY_2}}</text>
            <!-- Bottom decoration -->
            <rect x="25" y="490" width="40" height="3" fill="#FF6B6B" fill-opacity="0.3" rx="1.5"/>
        </g>

        <!-- Bottom center decoration -->
        <line x1="580" y1="660" x2="700" y2="660" stroke="#1E293B" stroke-width="1"/>
        <circle cx="640" cy="660" r="3" fill="#00D4FF" fill-opacity="0.4"/>
    </g>
</svg>
