<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- ==================== 背景 ==================== -->
    <rect width="1280" height="720" fill="#1A1A2E" />
    <!-- 目录专属 AI 背景图 -->
    <image href="{{TOC_BG}}" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <!-- 深色半透明遮罩 -->
    <rect x="0" y="0" width="1280" height="720" fill="#0D0D1A" fill-opacity="0.65" />

    <!-- ==================== 目录标题 ==================== -->
    <text x="60" y="80" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36"
        font-weight="bold">
        目录
    </text>
    <text x="155" y="80" fill="#FFFFFF" fill-opacity="0.5" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="18">
        CONTENTS
    </text>

    <!-- ==================== 目录项 ==================== -->
    <!-- 目录项 01 -->
    <rect x="60" y="130" width="560" height="100" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="95" y="185" fill="#FFFFFF" fill-opacity="0.9" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="40" font-weight="bold">01</text>
    <text x="160" y="170" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="22" font-weight="bold">{{TOC_ITEM_1_TITLE}}</text>
    <text x="160" y="202" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="14">{{TOC_ITEM_1_DESC}}</text>

    <!-- 目录项 02 -->
    <rect x="660" y="130" width="560" height="100" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="695" y="185" fill="#FFFFFF" fill-opacity="0.9" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="40" font-weight="bold">02</text>
    <text x="760" y="170" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="22" font-weight="bold">{{TOC_ITEM_2_TITLE}}</text>
    <text x="760" y="202" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="14">{{TOC_ITEM_2_DESC}}</text>

    <!-- 目录项 03 -->
    <rect x="60" y="310" width="560" height="100" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="95" y="365" fill="#FFFFFF" fill-opacity="0.9" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="40" font-weight="bold">03</text>
    <text x="160" y="350" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="22" font-weight="bold">{{TOC_ITEM_3_TITLE}}</text>
    <text x="160" y="382" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="14">{{TOC_ITEM_3_DESC}}</text>

    <!-- 目录项 04 -->
    <rect x="660" y="310" width="560" height="100" fill="#FFFFFF" fill-opacity="0.08" rx="8" />
    <text x="695" y="365" fill="#FFFFFF" fill-opacity="0.9" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="40" font-weight="bold">04</text>
    <text x="760" y="350" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="22" font-weight="bold">{{TOC_ITEM_4_TITLE}}</text>
    <text x="760" y="382" fill="#FFFFFF" fill-opacity="0.6" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="14">{{TOC_ITEM_4_DESC}}</text>

    <!-- 目录项 05（可选） -->
    <rect x="60" y="490" width="560" height="90" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="6,4" rx="8" />
    <text x="340" y="543" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="18">{{TOC_ITEM_5_TITLE}}</text>

    <!-- 目录项 06（可选） -->
    <rect x="660" y="490" width="560" height="90" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="6,4" rx="8" />
    <text x="940" y="543" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.4" font-family="Microsoft YaHei, Arial, sans-serif"
        font-size="18">{{TOC_ITEM_6_TITLE}}</text>
</svg>
